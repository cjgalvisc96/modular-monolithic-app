version: "3"

# Central command runner for the TODO modular monolith.
# Tasks follow a `scope:action` naming convention (env / check / fix / test /
# docker / clean). Run `task` or `task help` to list everything.
#
# Every Python tool is invoked through `uv run` (var PY) — Python is never
# executed directly.

vars:
  PY: "uv run"
  SRC: "src/todo_app"
  COMPOSE: "docker compose"
  PROJECT: "todo-app"
  TF_DIR: "infra/terraform"
  TG_DIR: "infra/terragrunt"
  ENV: '{{.ENV | default "dev"}}'
  # --- AWS / ECR / floci (local AWS) ---
  AWS_REGION: '{{.AWS_REGION | default "us-east-1"}}'
  AWS_PROFILE_NAME: '{{.AWS_PROFILE_NAME | default "floci"}}'
  # Our floci is independent of the local-gitops floci (:4566) — published on :4576.
  FLOCI_ENDPOINT: '{{.FLOCI_ENDPOINT | default "http://localhost:4576"}}'
  # The local-gitops platform's floci (shared across apps) listens on :4566.
  GITOPS_FLOCI_ENDPOINT: '{{.GITOPS_FLOCI_ENDPOINT | default "http://localhost:4566"}}'
  ECR_REPO: '{{.ECR_REPO | default "todo-app"}}'
  ECR_REGISTRY: '{{.ECR_REGISTRY | default ""}}'
  IMAGE_TAG: '{{.IMAGE_TAG | default "dev"}}'
  # Set AWS_ENDPOINT_URL (e.g. http://localhost:4566) to target floci; empty = real AWS.
  AWS_ENDPOINT_URL: '{{.AWS_ENDPOINT_URL | default ""}}'
  # --- Atlas (DB migrations; run via the Atlas Docker image, no host install) ---
  ATLAS_IMAGE: '{{.ATLAS_IMAGE | default "arigaio/atlas:latest"}}'
  ATLAS_NET: '{{.PROJECT}}-net' # compose network the running Postgres is on
  DB_URL: '{{.DB_URL | default "postgres://todo:todopassword@floci-rds-todo-aurora:5432/todo?sslmode=disable"}}'

env:
  PYTHONPATH: "src"

silent: true

tasks:
  default:
    desc: List available tasks
    cmds:
      - task: help

  help:
    desc: List available tasks
    cmds:
      - task --list-all

  # --- deps -----------------------------------------------------------------
  deps:check:
    desc: Guard — verify required tools are installed before running commands
    internal: true
    cmds:
      - |
        missing=""
        for tool in uv docker; do
          command -v "$tool" >/dev/null 2>&1 || missing="$missing $tool"
        done
        if [ -n "$missing" ]; then
          echo "Missing required tools:$missing" >&2
          exit 1
        fi

  # --- env ------------------------------------------------------------------
  env:create:
    desc: Bootstrap the virtualenv, sync all dependency groups (uv), and seed .env
    deps: [deps:check]
    cmds:
      - uv venv
      - uv sync --group dev --group test --group lint
      - '[ -f .env ] || cp .env.example .env'

  # --- check (static quality gates) -----------------------------------------
  check:linter:
    desc: Run ruff (lint + import sort) and verify formatting
    cmds:
      - "{{.PY}} ruff check {{.SRC}} tests"
      - "{{.PY}} ruff format --check {{.SRC}} tests"

  check:types:
    desc: Static type checking with pyright
    cmds:
      - "{{.PY}} pyright"

  check:deadcode:
    desc: Detect dead code with vulture
    cmds:
      - "{{.PY}} vulture"

  check:architecture:
    desc: Enforce DDD layer + bounded-context boundaries via import-linter
    cmds:
      - "{{.PY}} lint-imports"

  check:quality:
    desc: Full quality gate — lint, types, dead code, coverage threshold
    cmds:
      - task: check:linter
      - task: check:types
      - task: check:deadcode
      - task: test:coverage

  check:all:
    desc: Run every gate — quality + architecture
    cmds:
      - task: check:quality
      - task: check:architecture

  # --- fix ------------------------------------------------------------------
  fix:linter:
    desc: Auto-fix lint issues and format code (ruff)
    cmds:
      - "{{.PY}} ruff check --fix {{.SRC}} tests"
      - "{{.PY}} ruff format {{.SRC}} tests"

  # --- test -----------------------------------------------------------------
  test:unit:
    desc: Run the unit test suite
    cmds:
      - "{{.PY}} pytest tests/unit"

  test:integration:
    desc: Run the integration suite (DB-level; RLS test needs TEST_DATABASE_URL)
    cmds:
      - "{{.PY}} pytest tests/integration"

  test:e2e:
    desc: Run the end-to-end API suite
    cmds:
      - "{{.PY}} pytest tests/e2e"

  test:all:
    desc: Run the entire test suite (unit + integration + e2e + architecture)
    cmds:
      - "{{.PY}} pytest"

  test:coverage:
    desc: Run unit + integration + e2e with coverage (>=97% enforced)
    cmds:
      - "{{.PY}} pytest tests/unit tests/integration tests/e2e --cov --cov-report=term-missing"

  # --- clean ----------------------------------------------------------------
  clean:cache:
    desc: Remove venv + all Python, tooling, infra, and observability caches
    cmds:
      # Virtualenv + Python tooling caches
      - rm -rf .venv .pytest_cache .ruff_cache .import_linter_cache .coverage coverage.xml htmlcov 2>/dev/null || true
      # __pycache__ everywhere (skip .git)
      - find . -type d -name __pycache__ -not -path './.git/*' -prune -exec rm -rf {} + 2>/dev/null || true
      # Terraform / Terragrunt caches
      - find . -type d \( -name .terraform -o -name .terragrunt-cache \) -prune -exec rm -rf {} + 2>/dev/null || true
      # Observability stack data (Grafana/Prometheus/Tempo are Docker named volumes)
      - "{{.COMPOSE}} -f observability/docker-compose.observability.yml down -v --remove-orphans 2>/dev/null || true"

  # --- terraform (infra; pass ENV=dev|prod, default dev) --------------------
  terraform:fmt:
    desc: Check Terraform/Terragrunt formatting
    preconditions:
      - sh: command -v terraform
        msg: "Terraform not found. Install: https://developer.hashicorp.com/terraform/install"
      - sh: command -v terragrunt
        msg: "Terragrunt not found. Install: https://terragrunt.gruntwork.io/docs/getting-started/install/"
    cmds:
      - terraform fmt -check -recursive {{.TF_DIR}}
      - terragrunt hcl format --check --working-dir {{.TG_DIR}}

  terraform:validate:
    desc: Validate every Terraform module + the local floci stack (offline, no backend)
    preconditions:
      - sh: command -v terraform
        msg: "Terraform not found. Install: https://developer.hashicorp.com/terraform/install"
    cmds:
      - |
        set -e
        for d in {{.TF_DIR}}/modules/*/ {{.TF_DIR}}/local/; do
          [ -f "$d/main.tf" ] || continue
          echo "==> validate $d"
          terraform -chdir="$d" init -backend=false -input=false -no-color >/dev/null
          terraform -chdir="$d" validate -no-color
        done

  # ENV=dev|prod drive the cloud stacks via Terragrunt (S3 backend, full AWS).
  # ENV=local drives the floci stack (infra/terraform/local) via plain Terraform
  # with a local backend — the AWS resources floci can emulate (ECR + SSM).
  terraform:init:
    desc: 'Init an environment (ENV=dev|prod via Terragrunt; ENV=local = floci stack)'
    preconditions:
      - sh: command -v terraform
        msg: "Terraform not found. Install: https://developer.hashicorp.com/terraform/install"
    cmds:
      - |
        set -e
        if [ "{{.ENV}}" = "local" ]; then
          terraform -chdir={{.TF_DIR}}/local init -input=false
        else
          command -v terragrunt >/dev/null 2>&1 || { echo "Terragrunt not found. Install: https://terragrunt.gruntwork.io/docs/getting-started/install/" >&2; exit 1; }
          ( cd {{.TG_DIR}}/{{.ENV}} && terragrunt init -input=false )
        fi

  terraform:plan:
    desc: 'Plan an environment (ENV=dev|prod via Terragrunt; ENV=local = floci stack)'
    preconditions:
      - sh: command -v terraform
        msg: "Terraform not found. Install: https://developer.hashicorp.com/terraform/install"
    cmds:
      - |
        set -e
        if [ "{{.ENV}}" = "local" ]; then
          terraform -chdir={{.TF_DIR}}/local plan -input=false -out=tfplan
        else
          command -v terragrunt >/dev/null 2>&1 || { echo "Terragrunt not found. Install: https://terragrunt.gruntwork.io/docs/getting-started/install/" >&2; exit 1; }
          ( cd {{.TG_DIR}}/{{.ENV}} && terragrunt plan -input=false -out=tfplan )
        fi

  terraform:apply:
    desc: 'Apply an environment (ENV=dev|prod via Terragrunt; ENV=local = floci stack). AUTO_APPROVE=true for CI.'
    preconditions:
      - sh: command -v terraform
        msg: "Terraform not found. Install: https://developer.hashicorp.com/terraform/install"
    cmds:
      - |
        set -e
        if [ "{{.ENV}}" = "local" ]; then
          terraform -chdir={{.TF_DIR}}/local apply -input=false {{if eq .AUTO_APPROVE "true"}}-auto-approve{{end}}
        else
          command -v terragrunt >/dev/null 2>&1 || { echo "Terragrunt not found. Install: https://terragrunt.gruntwork.io/docs/getting-started/install/" >&2; exit 1; }
          ( cd {{.TG_DIR}}/{{.ENV}} && terragrunt apply -input=false {{if eq .AUTO_APPROVE "true"}}-auto-approve{{end}} )
        fi

  terraform:destroy:
    desc: 'Destroy an environment (ENV=dev|prod via Terragrunt; ENV=local = floci stack). AUTO_APPROVE=true for CI.'
    preconditions:
      - sh: command -v terraform
        msg: "Terraform not found. Install: https://developer.hashicorp.com/terraform/install"
    cmds:
      - |
        set -e
        if [ "{{.ENV}}" = "local" ]; then
          terraform -chdir={{.TF_DIR}}/local destroy -input=false {{if eq .AUTO_APPROVE "true"}}-auto-approve{{end}}
        else
          command -v terragrunt >/dev/null 2>&1 || { echo "Terragrunt not found. Install: https://terragrunt.gruntwork.io/docs/getting-started/install/" >&2; exit 1; }
          ( cd {{.TG_DIR}}/{{.ENV}} && terragrunt destroy -input=false {{if eq .AUTO_APPROVE "true"}}-auto-approve{{end}} )
        fi

  terraform:test:
    desc: Run Terratest infra tests (Go) for the Helm/Terraform layer
    dir: infra/tests/terratest
    preconditions:
      - sh: command -v go
        msg: "Go not found (needed for Terratest). Install: https://go.dev/doc/install  •  snap: sudo snap install go --classic"
    cmds:
      - go test -v -timeout 30m ./...

  terraform:trivy:
    desc: Trivy IaC misconfiguration scan of the Terraform code
    preconditions:
      - sh: command -v trivy
        msg: "Trivy not found. Install: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin"
    cmds:
      # Skip infra/terraform/local — the floci stack is deliberately un-hardened
      # (no KMS/encryption/lifecycle) for emulator compatibility; it never ships.
      - trivy config --severity HIGH,CRITICAL --exit-code 1 --ignorefile {{.TF_DIR}}/.trivyignore --skip-dirs {{.TF_DIR}}/local {{.TF_DIR}}

  terraform:costs:
    desc: 'Infracost estimate for an environment (ENV=dev|prod). First run prompts a free login.'
    preconditions:
      - sh: command -v infracost
        msg: "Infracost not found. Install: curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh"
    cmds:
      # `scan` replaces the deprecated `breakdown`; path is positional.
      # If unauthenticated, infracost itself prompts the free browser login.
      - infracost scan {{.TF_DIR}}/environments/{{.ENV}}

  # --- ecr (container registry; works with real AWS ECR or floci) -----------
  # For floci, prefix with: AWS_PROFILE=floci AWS_ENDPOINT_URL=http://localhost:4566
  # Each ecr task inlines this resolution of REGISTRY (host[:port]) + REPO_URI so
  # CLI-passed vars (AWS_ENDPOINT_URL, ECR_REPO, ...) propagate correctly. It
  # prefers the repository's real repositoryUri — correct for both AWS ECR and
  # floci (whose registry host is non-standard, e.g. ...ecr.<region>.localhost:5000)
  # — and falls back to the standard account-derived registry when the repo
  # doesn't exist yet:
  #   EP=...; REGISTRY=...; REPO_URI=...
  ecr:login:
    desc: 'Authenticate Docker to ECR (host derived from the repo URI / account)'
    preconditions:
      - sh: command -v aws
        msg: "AWS CLI not found. Install: https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html"
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - |
        set -euo pipefail
        EP="{{if .AWS_ENDPOINT_URL}}--endpoint-url {{.AWS_ENDPOINT_URL}}{{end}}"
        REGISTRY="{{.ECR_REGISTRY}}"; REPO_URI=""
        if [ -z "$REGISTRY" ]; then
          REPO_URI=$(aws $EP --region {{.AWS_REGION}} ecr describe-repositories --repository-names {{.ECR_REPO}} \
            --query 'repositories[0].repositoryUri' --output text 2>/dev/null || true)
        fi
        if [ -n "$REPO_URI" ] && [ "$REPO_URI" != "None" ]; then REGISTRY="${REPO_URI%%/*}"; else
          [ -n "$REGISTRY" ] || REGISTRY="$(aws $EP --region {{.AWS_REGION}} sts get-caller-identity --query Account --output text).dkr.ecr.{{.AWS_REGION}}.amazonaws.com"
        fi
        aws $EP --region {{.AWS_REGION}} ecr get-login-password \
          | docker login --username AWS --password-stdin "$REGISTRY"
        echo "Logged in to $REGISTRY"

  ecr:build:
    desc: 'Build the production image as {{.ECR_REPO}}:{{.IMAGE_TAG}}'
    preconditions:
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - docker build --target prod -t {{.ECR_REPO}}:{{.IMAGE_TAG}} .

  ecr:push:
    desc: 'Build, tag and push {{.ECR_REPO}}:{{.IMAGE_TAG}} to ECR'
    deps: [ecr:build, ecr:login]
    cmds:
      - |
        set -euo pipefail
        EP="{{if .AWS_ENDPOINT_URL}}--endpoint-url {{.AWS_ENDPOINT_URL}}{{end}}"
        # Ensure the repository exists (no-op if it already does).
        aws $EP --region {{.AWS_REGION}} ecr describe-repositories --repository-names {{.ECR_REPO}} >/dev/null 2>&1 \
          || aws $EP --region {{.AWS_REGION}} ecr create-repository --repository-name {{.ECR_REPO}} >/dev/null
        REPO_URI=$(aws $EP --region {{.AWS_REGION}} ecr describe-repositories --repository-names {{.ECR_REPO}} \
          --query 'repositories[0].repositoryUri' --output text)
        docker tag {{.ECR_REPO}}:{{.IMAGE_TAG}} "${REPO_URI}:{{.IMAGE_TAG}}"
        docker push "${REPO_URI}:{{.IMAGE_TAG}}"
        echo "Pushed ${REPO_URI}:{{.IMAGE_TAG}}"

  ecr:pull:
    desc: 'Pull {{.ECR_REPO}}:{{.IMAGE_TAG}} from ECR (verifies the pushed image)'
    deps: [ecr:login]
    cmds:
      - |
        set -euo pipefail
        EP="{{if .AWS_ENDPOINT_URL}}--endpoint-url {{.AWS_ENDPOINT_URL}}{{end}}"
        REPO_URI=$(aws $EP --region {{.AWS_REGION}} ecr describe-repositories --repository-names {{.ECR_REPO}} \
          --query 'repositories[0].repositoryUri' --output text)
        docker pull "${REPO_URI}:{{.IMAGE_TAG}}"

  # --- k8s ------------------------------------------------------------------
  k8s:trivy:
    desc: Trivy misconfiguration scan of the Helm chart (HIGH/CRITICAL)
    preconditions:
      - sh: command -v trivy
        msg: "Trivy not found. Install: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin"
    cmds:
      # Trivy renders the Helm chart with its default values and scans the manifests.
      - trivy config --severity HIGH,CRITICAL --exit-code 1 infra/k8s/helm

  # --- floci (local AWS emulator; aligns with local-gitops) -----------------
  aws:profile:
    desc: 'Ensure the local "{{.AWS_PROFILE_NAME}}" AWS CLI profile exists (creds test/test)'
    internal: true
    preconditions:
      - sh: command -v aws
        msg: "AWS CLI not found. Install: https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html"
    cmds:
      - |
        aws configure set aws_access_key_id test          --profile {{.AWS_PROFILE_NAME}}
        aws configure set aws_secret_access_key test       --profile {{.AWS_PROFILE_NAME}}
        aws configure set region {{.AWS_REGION}}           --profile {{.AWS_PROFILE_NAME}}
        aws configure set output json                      --profile {{.AWS_PROFILE_NAME}}

  floci:seed:
    desc: 'Seed floci (local AWS) with the ECR repo + SSM params the app/GitOps consume'
    deps: [aws:profile]
    cmds:
      - |
        set -euo pipefail
        export AWS_PROFILE={{.AWS_PROFILE_NAME}}
        EP="--endpoint-url {{.FLOCI_ENDPOINT}}"
        # Wait for floci to answer before seeding.
        ready=""
        for _ in $(seq 1 30); do
          curl -sf "{{.FLOCI_ENDPOINT}}" >/dev/null 2>&1 && { ready=1; break; }
          sleep 2
        done
        if [ -z "$ready" ]; then
          echo "floci not reachable at {{.FLOCI_ENDPOINT}} — start it (task docker:up) first." >&2
          exit 1
        fi
        aws $EP ecr describe-repositories --repository-names {{.ECR_REPO}} >/dev/null 2>&1 \
          || aws $EP ecr create-repository --repository-name {{.ECR_REPO}} >/dev/null
        echo "ecr: {{.ECR_REPO}}"
        for env in dev prod; do
          pfx="/gitops/${env}/todo-app"
          aws $EP ssm put-parameter --overwrite --type String       --name "${pfx}/DB_USER"        --value "todo"      >/dev/null
          aws $EP ssm put-parameter --overwrite --type SecureString --name "${pfx}/DB_PASSWORD"    --value "todo"      >/dev/null
          aws $EP ssm put-parameter --overwrite --type SecureString --name "${pfx}/REDIS_PASSWORD" --value "redispass" >/dev/null
          echo "ssm: ${pfx}/{DB_USER,DB_PASSWORD,REDIS_PASSWORD}"
        done

  gitops:seed-floci:
    desc: 'Seed THIS app into the local-gitops floci (SSM params + ECR repo). ENDPOINT defaults to :4566'
    deps: [aws:profile]
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} AWS_ENDPOINT_URL={{.GITOPS_FLOCI_ENDPOINT}} ./infra/k8s/gitops/floci-seed.sh

  floci:wait-datastores:
    desc: 'Wait until the floci-provisioned Aurora backing accepts connections (fails loudly if not)'
    preconditions:
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - |
        ready=""
        for _ in $(seq 1 45); do
          docker run --rm --network {{.PROJECT}}-net -e PGPASSWORD=todopassword postgres:16-alpine \
            pg_isready -h floci-rds-todo-aurora -U todo -d todo >/dev/null 2>&1 && { ready=1; break; }
          sleep 2
        done
        [ -n "$ready" ] || { echo "ERROR: Aurora (floci-rds-todo-aurora) never became ready" >&2; exit 1; }
        echo "aurora ready"

  # --- atlas (DB schema migrations via the Atlas Docker image) --------------
  atlas:migrate:
    desc: 'Apply pending Atlas migrations to the running Postgres (creates tables + RLS)'
    preconditions:
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - |
        docker run --rm --network {{.ATLAS_NET}} -v "$PWD/migrations:/work" -w /work {{.ATLAS_IMAGE}} \
          migrate apply --url "{{.DB_URL}}" --dir file://versions

  atlas:status:
    desc: 'Show Atlas migration status (applied vs pending) for the running Postgres'
    preconditions:
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - |
        docker run --rm --network {{.ATLAS_NET}} -v "$PWD/migrations:/work" -w /work {{.ATLAS_IMAGE}} \
          migrate status --url "{{.DB_URL}}" --dir file://versions

  atlas:new:
    desc: 'Create a new empty versioned migration to hand-edit (NAME=add_something)'
    preconditions:
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - |
        [ -n "{{.NAME}}" ] || { echo "Usage: task atlas:new NAME=<migration_name>" >&2; exit 1; }
        docker run --rm -v "$PWD/migrations:/work" -w /work {{.ATLAS_IMAGE}} \
          migrate new {{.NAME}} --dir file://versions
        echo "Edit the new file under migrations/versions/, then run: task atlas:hash"

  atlas:hash:
    desc: 'Recompute migrations/versions/atlas.sum after editing migration files'
    preconditions:
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - docker run --rm -v "$PWD/migrations:/work" -w /work {{.ATLAS_IMAGE}} migrate hash --dir file://versions

  # --- docs (mkdocs project documentation site; separate from FastAPI /docs) -
  docs:serve:
    desc: 'Serve the mkdocs documentation site at http://127.0.0.1:8001 (API uses :8000)'
    cmds:
      - "{{.PY}} --group docs mkdocs serve -a 127.0.0.1:8001"

  docs:build:
    desc: 'Build the mkdocs documentation site into ./site'
    cmds:
      - "{{.PY}} --group docs mkdocs build --strict"

  # --- datastore access (floci-backed Aurora / ElastiCache) -----------------
  aurora:cli:
    desc: 'Open a psql shell on the floci Aurora (Postgres) backing'
    cmds:
      - docker exec -it -e PGPASSWORD=todopassword floci-rds-todo-aurora psql -U todo -d todo

  cache:cli:
    desc: 'Open a valkey-cli (Redis) shell on the floci ElastiCache backing'
    cmds:
      - docker exec -it floci-valkey-todo-redis valkey-cli

  # --- seed -----------------------------------------------------------------
  seed:demo:
    desc: 'Run the demo-data seeder init container against the running stack (idempotent)'
    cmds:
      - "{{.COMPOSE}} run --rm seed"

  # --- docker ---------------------------------------------------------------
  docker:_bringup:
    internal: true
    deps: [deps:check]
    cmds:
      - "{{.COMPOSE}} up -d --wait floci"
      - |
        export TF_VAR_floci_endpoint="{{.FLOCI_ENDPOINT}}"
        if ! command -v terraform >/dev/null 2>&1; then
          echo "Terraform is required to provision the floci stack (ECR/SSM + Aurora/ElastiCache)." >&2
          echo "Install: https://developer.hashicorp.com/terraform/install" >&2
          exit 1
        fi
        task terraform:init ENV=local
        task terraform:apply ENV=local AUTO_APPROVE=true
      - task: floci:wait-datastores
      - "{{.COMPOSE}} up -d --build --wait app aurora-fwd cache-fwd"

  docker:up:
    desc: 'Clean caches, then ordered local stack: floci → setup (terraform ENV=local) → app, then stream API logs'
    cmds:
      - task: clean:cache
      - task: docker:_bringup
      # Stream the API logs (Ctrl+C to detach; containers keep running detached).
      - "{{.COMPOSE}} logs -f app"

  docker:down:
    desc: Stop and remove containers, then clean caches
    cmds:
      - "{{.COMPOSE}} down"
      - task: clean:cache

  docker:prune:
    desc: Remove ALL todo-app docker resources — containers, images, volumes, networks (keeps local-gitops)
    cmds:
      - "{{.COMPOSE}} down -v --remove-orphans 2>/dev/null || true"
      # Sweep anything left named/tagged for this app; spares the local-gitops
      # floci and the gitops/todo-app image.
      - |
        set -e
        ids=$(docker ps -aq --filter "name=todo-app" 2>/dev/null || true)
        [ -n "$ids" ]  && { docker rm -f $ids >/dev/null;        echo "containers removed: $(echo $ids | wc -w)"; }  || true
        imgs=$(docker images --format '{{"{{"}}.Repository{{"}}"}}:{{"{{"}}.Tag{{"}}"}}' 2>/dev/null | grep -E '(^|/)todo-app:|^arigaio/atlas:' | grep -v 'gitops/todo-app' || true)
        [ -n "$imgs" ] && { docker rmi -f $imgs >/dev/null 2>&1;  echo "images removed: $(echo "$imgs" | wc -l)"; }    || true
        vols=$(docker volume ls -q --filter "name=todo-app" 2>/dev/null || true)
        [ -n "$vols" ] && { docker volume rm $vols >/dev/null;    echo "volumes removed: $(echo $vols | wc -w)"; }     || true
        nets=$(docker network ls -q --filter "name=todo-app" 2>/dev/null || true)
        [ -n "$nets" ] && { docker network rm $nets >/dev/null 2>&1; echo "networks removed: $(echo $nets | wc -w)"; } || true
        docker rm -f floci-rds-todo-aurora floci-valkey-todo-redis >/dev/null 2>&1 || true
        rm -f {{.TF_DIR}}/local/terraform.tfstate {{.TF_DIR}}/local/terraform.tfstate.backup 2>/dev/null || true
        echo "Pruned all todo-app docker resources."
      - task: clean:cache

  docker:shell:
    desc: Open a shell in the running app container
    cmds:
      - "{{.COMPOSE}} exec app /bin/bash"

  docker:logs:
    desc: Tail logs from all services
    cmds:
      - "{{.COMPOSE}} logs -f"

  docker:smoke:
    desc: Verify the running stack — /health 200 (db+redis ok), /metrics and / reachable
    cmds:
      - |
        set -e
        echo "GET /health";  curl -fsS http://localhost:8000/health; echo
        echo "GET /metrics"; curl -fsS http://localhost:8000/metrics >/dev/null && echo "metrics ok"
        echo "GET /";        curl -fsS http://localhost:8000/ >/dev/null && echo "root ok"
        echo "Stack is healthy."

  docker:test:
    desc: Full local stack test — bring up floci → terraform → app, then smoke-check
    cmds:
      - task: docker:_bringup
      - task: docker:verify

  docker:verify:
    desc: Verify the running stack end-to-end — DB + Redis + floci (AWS) integration
    cmds:
      - |
        fail=0
        ok()  { printf '  \033[32m✓\033[0m %s\n' "$1"; }
        bad() { printf '  \033[31m✗\033[0m %s\n' "$1"; fail=1; }

        echo "── 1. API health (DB + Redis as the app sees them) ──"
        health=$(curl -fsS http://localhost:8000/health 2>/dev/null || true)
        echo "    ${health:-<no response — is the app up? run: task docker:up>}"
        printf '%s' "$health" | grep -q '"database":"ok"' && ok "app → database: ok" || bad "app → database NOT ok"
        printf '%s' "$health" | grep -q '"redis":"ok"'    && ok "app → redis: ok"    || bad "app → redis NOT ok"

        echo "── 2. Aurora (Postgres via floci RDS) — direct connection + schema ──"
        PG="docker run --rm --network {{.PROJECT}}-net -e PGPASSWORD=todopassword postgres:16-alpine psql -h floci-rds-todo-aurora -U todo -d todo -tAc"
        if v=$($PG 'show server_version' 2>/dev/null | tr -d '\r'); then
          ok "aurora reachable (v$v)"
        else
          bad "aurora (floci-rds-todo-aurora) not reachable"
        fi
        n=$($PG "select count(*) from information_schema.tables where table_schema='public' and table_name in ('users','tasks','ai_suggestions')" 2>/dev/null | tr -d '\r')
        [ "$n" = "3" ] && ok "schema migrated (users, tasks, ai_suggestions)" || bad "schema NOT migrated ($n/3 tables)"

        echo "── 3. ElastiCache (Redis via floci) — direct connection ──"
        [ "$(docker run --rm --network {{.PROJECT}}-net redis:7-alpine redis-cli -h floci-valkey-todo-redis ping 2>/dev/null | tr -d '\r')" = "PONG" ] && ok "elasticache PONG" || bad "elasticache no PONG"

        echo "── 4. floci (AWS) integration — from INSIDE the app container ──"
        out=$({{.COMPOSE}} exec -T app python -c "import boto3,os; ep=os.environ.get('AWS_ENDPOINT_URL'); ecr=boto3.client('ecr',endpoint_url=ep); r=[x['repositoryName'] for x in ecr.describe_repositories()['repositories']]; ssm=boto3.client('ssm',endpoint_url=ep); val=ssm.get_parameter(Name='/gitops/dev/todo-app/DB_USER')['Parameter']['Value']; print('EP=%s ECR=%s SSM:/gitops/dev/todo-app/DB_USER=%s'%(ep,r,val))" 2>&1 || true)
        echo "    $out"
        printf '%s' "$out" | grep -q 'ECR=' && ok "app → floci: ECR + SSM reachable" || bad "app → floci unreachable"

        echo
        if [ "$fail" -eq 0 ]; then
          printf '\033[32m✅ All checks passed — DB + Redis + floci integration working.\033[0m\n'
        else
          printf '\033[31m❌ Some checks FAILED (see above).\033[0m\n'; exit 1
        fi
