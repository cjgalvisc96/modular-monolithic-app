version: "3"

# Central command runner for the TODO modular monolith.
# Tasks follow a `scope:action` naming convention (env / check / fix / test /
# docker / clean). Run `task` or `task help` to list everything.
#
# Every Python tool is invoked through `uv run` (var PY) — Python is never
# executed directly.

vars:
  PY: "uv run"
  SRC: "src/todo_app"
  COMPOSE: "docker compose"
  PROJECT: "todo-app"
  TF_DIR: "infra/terraform"
  TG_DIR: "infra/terragrunt"
  ENV: '{{.ENV | default "dev"}}'
  # --- AWS / ECR / floci (local AWS) ---
  AWS_REGION: '{{.AWS_REGION | default "us-east-1"}}'
  AWS_PROFILE_NAME: '{{.AWS_PROFILE_NAME | default "floci"}}'
  # Our floci is independent of the local-gitops floci (:4566) — published on :4576.
  FLOCI_ENDPOINT: '{{.FLOCI_ENDPOINT | default "http://localhost:4576"}}'
  # The local-gitops platform's floci (shared across apps) listens on :4566.
  GITOPS_FLOCI_ENDPOINT: '{{.GITOPS_FLOCI_ENDPOINT | default "http://localhost:4566"}}'
  # --- local-gitops Gitea (push target for the local CI/CD pipeline) ---
  # Lab defaults from local-gitops/lib/common.sh; override via env for other labs.
  GITEA_WEB: '{{.GITEA_WEB | default "http://gitea.dev.local"}}'
  # The 'gitops' org is what install.sh creates and Argo watches (matches the
  # repoURL in infra/k8s/gitops/applications/*). Override GITEA_NS for another.
  GITEA_NS: '{{.GITEA_NS | default "gitops"}}'
  GITEA_REPO_NAME: '{{.GITEA_REPO_NAME | default "modular-monolithic-app"}}'
  GITEA_BRANCH: '{{.GITEA_BRANCH | default "main"}}'
  GITEA_USER: '{{.GITEA_USER | default "adminlocal"}}'
  GITEA_PASSWORD: '{{.GITEA_PASSWORD | default "adminlocal1"}}'
  # In-cluster Gitea URL Argo uses (the MetalLB git-lb IP) — must match the
  # repoURL in infra/k8s/gitops/applications/*. Argo clusters to register on.
  GITEA_INCLUSTER_URL: '{{.GITEA_INCLUSTER_URL | default "http://172.18.255.209:3000"}}'
  ARGO_CLUSTERS: '{{.ARGO_CLUSTERS | default "dev prod"}}'
  ECR_REPO: '{{.ECR_REPO | default "todo-app"}}'
  ECR_REGISTRY: '{{.ECR_REGISTRY | default ""}}'
  IMAGE_TAG: '{{.IMAGE_TAG | default "dev"}}'
  # Set AWS_ENDPOINT_URL (e.g. http://localhost:4566) to target floci; empty = real AWS.
  AWS_ENDPOINT_URL: '{{.AWS_ENDPOINT_URL | default ""}}'
  # --- Atlas (DB migrations; run via the Atlas Docker image, no host install) ---
  ATLAS_IMAGE: '{{.ATLAS_IMAGE | default "arigaio/atlas:latest"}}'
  ATLAS_NET: '{{.PROJECT}}-net' # compose network the running Postgres is on
  DB_URL: '{{.DB_URL | default "postgres://todo:todopassword@floci-rds-todo-aurora:5432/todo?sslmode=disable"}}'

env:
  PYTHONPATH: "src"

silent: true

tasks:
  default:
    desc: List available tasks
    cmds:
      - task: help

  help:
    desc: List available tasks
    cmds:
      - task --list-all

  # --- deps -----------------------------------------------------------------
  deps:check:
    desc: Guard — verify required tools are installed before running commands
    internal: true
    cmds:
      - |
        missing=""
        for tool in uv docker; do
          command -v "$tool" >/dev/null 2>&1 || missing="$missing $tool"
        done
        if [ -n "$missing" ]; then
          echo "Missing required tools:$missing" >&2
          exit 1
        fi

  # --- env ------------------------------------------------------------------
  env:create:
    desc: Bootstrap the virtualenv, sync all dependency groups (uv), and seed .env
    deps: [deps:check]
    cmds:
      - uv venv
      - uv sync --group dev --group test --group lint
      - '[ -f .env ] || cp .env.example .env'

  # --- check (static quality gates) -----------------------------------------
  check:linter:
    desc: Run ruff (lint + import sort) and verify formatting
    cmds:
      - "{{.PY}} ruff check {{.SRC}} tests"
      - "{{.PY}} ruff format --check {{.SRC}} tests"

  check:types:
    desc: Static type checking with pyright
    cmds:
      - "{{.PY}} pyright"

  check:deadcode:
    desc: Detect dead code with vulture
    cmds:
      - "{{.PY}} vulture"

  check:architecture:
    desc: Enforce DDD layer + bounded-context boundaries via import-linter
    cmds:
      - "{{.PY}} lint-imports"

  check:quality:
    desc: Full quality gate — lint, types, dead code, coverage threshold
    cmds:
      - task: check:linter
      - task: check:types
      - task: check:deadcode
      - task: test:coverage

  check:all:
    desc: Run every gate — quality + architecture
    cmds:
      - task: check:quality
      - task: check:architecture

  # --- fix ------------------------------------------------------------------
  fix:linter:
    desc: Auto-fix lint issues and format code (ruff)
    cmds:
      - "{{.PY}} ruff check --fix {{.SRC}} tests"
      - "{{.PY}} ruff format {{.SRC}} tests"

  # --- test -----------------------------------------------------------------
  test:unit:
    desc: Run the unit test suite
    cmds:
      - "{{.PY}} pytest tests/unit"

  test:integration:
    desc: Run the integration suite (DB-level; RLS test needs TEST_DATABASE_URL)
    cmds:
      - "{{.PY}} pytest tests/integration"

  test:all:
    desc: Run the entire test suite (unit + integration + architecture)
    cmds:
      - "{{.PY}} pytest"

  test:coverage:
    desc: Run unit + integration with coverage (>=97% enforced)
    cmds:
      - "{{.PY}} pytest tests/unit tests/integration --cov --cov-report=term-missing"

  # --- clean ----------------------------------------------------------------
  clean:cache:
    desc: Remove venv + all Python, tooling, infra, and observability caches
    cmds:
      # Virtualenv + Python tooling caches
      - rm -rf .venv .pytest_cache .ruff_cache .import_linter_cache .coverage coverage.xml htmlcov 2>/dev/null || true
      # __pycache__ everywhere (skip .git)
      - find . -type d -name __pycache__ -not -path './.git/*' -prune -exec rm -rf {} + 2>/dev/null || true
      # Terraform / Terragrunt caches
      - find . -type d \( -name .terraform -o -name .terragrunt-cache \) -prune -exec rm -rf {} + 2>/dev/null || true
      # Observability stack data (Grafana/Prometheus/Tempo are Docker named volumes)
      - "{{.COMPOSE}} -f observability/docker-compose.observability.yml down -v --remove-orphans 2>/dev/null || true"

  # --- terraform (infra; pass ENV=dev|prod, default dev) --------------------
  terraform:fmt:
    desc: Check Terraform/Terragrunt formatting
    preconditions:
      - sh: command -v terraform
        msg: "Terraform not found. Install: https://developer.hashicorp.com/terraform/install"
      - sh: command -v terragrunt
        msg: "Terragrunt not found. Install: https://terragrunt.gruntwork.io/docs/getting-started/install/"
    cmds:
      - terraform fmt -check -recursive {{.TF_DIR}}
      - terragrunt hcl format --check --working-dir {{.TG_DIR}}

  terraform:validate:
    desc: Validate every Terraform module + the local floci stack (offline, no backend)
    preconditions:
      - sh: command -v terraform
        msg: "Terraform not found. Install: https://developer.hashicorp.com/terraform/install"
    cmds:
      - |
        set -e
        for d in {{.TF_DIR}}/modules/*/ {{.TF_DIR}}/local/; do
          [ -f "$d/main.tf" ] || continue
          echo "==> validate $d"
          terraform -chdir="$d" init -backend=false -input=false -no-color >/dev/null
          terraform -chdir="$d" validate -no-color
        done

  # ENV=dev|prod drive the floci/cloud stacks via Terragrunt (the GitOps pipeline
  # path). ENV=local drives the standalone docker-compose dev stack
  # (infra/terraform/local) via plain Terraform — used by `task docker:up`.
  terraform:init:
    desc: 'Init an environment (ENV=dev|prod via Terragrunt; ENV=local = docker-compose floci stack)'
    preconditions:
      - sh: command -v terraform
        msg: "Terraform not found. Install: https://developer.hashicorp.com/terraform/install"
    cmds:
      - |
        set -e
        if [ "{{.ENV}}" = "local" ]; then
          terraform -chdir={{.TF_DIR}}/local init -input=false
        else
          command -v terragrunt >/dev/null 2>&1 || { echo "Terragrunt not found. Install: https://terragrunt.gruntwork.io/docs/getting-started/install/" >&2; exit 1; }
          ( cd {{.TG_DIR}}/{{.ENV}} && terragrunt init -input=false )
        fi

  terraform:plan:
    desc: 'Plan an environment (ENV=dev|prod via Terragrunt; ENV=local = docker-compose floci stack)'
    preconditions:
      - sh: command -v terraform
        msg: "Terraform not found. Install: https://developer.hashicorp.com/terraform/install"
    cmds:
      - |
        set -e
        if [ "{{.ENV}}" = "local" ]; then
          terraform -chdir={{.TF_DIR}}/local plan -input=false -out=tfplan
        else
          command -v terragrunt >/dev/null 2>&1 || { echo "Terragrunt not found. Install: https://terragrunt.gruntwork.io/docs/getting-started/install/" >&2; exit 1; }
          ( cd {{.TG_DIR}}/{{.ENV}} && terragrunt plan -input=false -out=tfplan )
        fi

  terraform:apply:
    desc: 'Apply an environment (ENV=dev|prod via Terragrunt; ENV=local = docker-compose floci stack). AUTO_APPROVE=true for CI.'
    preconditions:
      - sh: command -v terraform
        msg: "Terraform not found. Install: https://developer.hashicorp.com/terraform/install"
    cmds:
      - |
        set -e
        if [ "{{.ENV}}" = "local" ]; then
          terraform -chdir={{.TF_DIR}}/local apply -input=false {{if eq .AUTO_APPROVE "true"}}-auto-approve{{end}}
        else
          command -v terragrunt >/dev/null 2>&1 || { echo "Terragrunt not found. Install: https://terragrunt.gruntwork.io/docs/getting-started/install/" >&2; exit 1; }
          ( cd {{.TG_DIR}}/{{.ENV}} && terragrunt apply -input=false {{if eq .AUTO_APPROVE "true"}}-auto-approve{{end}} )
        fi

  terraform:destroy:
    desc: 'Destroy an environment (ENV=dev|prod via Terragrunt; ENV=local = docker-compose floci stack). AUTO_APPROVE=true for CI.'
    preconditions:
      - sh: command -v terraform
        msg: "Terraform not found. Install: https://developer.hashicorp.com/terraform/install"
    cmds:
      - |
        set -e
        if [ "{{.ENV}}" = "local" ]; then
          terraform -chdir={{.TF_DIR}}/local destroy -input=false {{if eq .AUTO_APPROVE "true"}}-auto-approve{{end}}
        else
          command -v terragrunt >/dev/null 2>&1 || { echo "Terragrunt not found. Install: https://terragrunt.gruntwork.io/docs/getting-started/install/" >&2; exit 1; }
          ( cd {{.TG_DIR}}/{{.ENV}} && terragrunt destroy -input=false {{if eq .AUTO_APPROVE "true"}}-auto-approve{{end}} )
        fi

  terraform:test:
    desc: Run Terratest infra tests (Go) for the Helm/Terraform layer
    dir: infra/tests/terratest
    preconditions:
      - sh: command -v go
        msg: "Go not found (needed for Terratest). Install: https://go.dev/doc/install  •  snap: sudo snap install go --classic"
    cmds:
      - go test -v -timeout 30m ./...

  terraform:trivy:
    desc: Trivy IaC misconfiguration scan of the Terraform code
    preconditions:
      - sh: command -v trivy
        msg: "Trivy not found. Install: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin"
    cmds:
      # Skip infra/terraform/local — the docker-compose floci stack is deliberately
      # un-hardened (no KMS/encryption/lifecycle) for emulator compatibility.
      - trivy config --severity HIGH,CRITICAL --exit-code 1 --ignorefile {{.TF_DIR}}/.trivyignore --skip-dirs {{.TF_DIR}}/local {{.TF_DIR}}

  terraform:costs:
    desc: 'Infracost estimate for an environment (ENV=dev|prod). First run prompts a free login.'
    preconditions:
      - sh: command -v infracost
        msg: "Infracost not found. Install: curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh"
    cmds:
      # `scan` replaces the deprecated `breakdown`; path is positional.
      # If unauthenticated, infracost itself prompts the free browser login.
      - infracost scan {{.TF_DIR}}/environments/{{.ENV}}

  # --- ecr (container registry; works with real AWS ECR or floci) -----------
  # For floci, prefix with: AWS_PROFILE=floci AWS_ENDPOINT_URL=http://localhost:4566
  # Each ecr task inlines this resolution of REGISTRY (host[:port]) + REPO_URI so
  # CLI-passed vars (AWS_ENDPOINT_URL, ECR_REPO, ...) propagate correctly. It
  # prefers the repository's real repositoryUri — correct for both AWS ECR and
  # floci (whose registry host is non-standard, e.g. ...ecr.<region>.localhost:5000)
  # — and falls back to the standard account-derived registry when the repo
  # doesn't exist yet:
  #   EP=...; REGISTRY=...; REPO_URI=...
  ecr:login:
    desc: 'Authenticate Docker to ECR (host derived from the repo URI / account)'
    preconditions:
      - sh: command -v aws
        msg: "AWS CLI not found. Install: https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html"
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - |
        set -euo pipefail
        EP="{{if .AWS_ENDPOINT_URL}}--endpoint-url {{.AWS_ENDPOINT_URL}}{{end}}"
        REGISTRY="{{.ECR_REGISTRY}}"; REPO_URI=""
        if [ -z "$REGISTRY" ]; then
          REPO_URI=$(aws $EP --region {{.AWS_REGION}} ecr describe-repositories --repository-names {{.ECR_REPO}} \
            --query 'repositories[0].repositoryUri' --output text 2>/dev/null || true)
        fi
        if [ -n "$REPO_URI" ] && [ "$REPO_URI" != "None" ]; then REGISTRY="${REPO_URI%%/*}"; else
          [ -n "$REGISTRY" ] || REGISTRY="$(aws $EP --region {{.AWS_REGION}} sts get-caller-identity --query Account --output text).dkr.ecr.{{.AWS_REGION}}.amazonaws.com"
        fi
        aws $EP --region {{.AWS_REGION}} ecr get-login-password \
          | docker login --username AWS --password-stdin "$REGISTRY"
        echo "Logged in to $REGISTRY"

  ecr:build:
    desc: 'Build the production image as {{.ECR_REPO}}:{{.IMAGE_TAG}}'
    preconditions:
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - docker build --target prod -t {{.ECR_REPO}}:{{.IMAGE_TAG}} .

  ecr:push:
    desc: 'Build, tag and push {{.ECR_REPO}}:{{.IMAGE_TAG}} to ECR'
    deps: [ecr:build, ecr:login]
    cmds:
      - |
        set -euo pipefail
        EP="{{if .AWS_ENDPOINT_URL}}--endpoint-url {{.AWS_ENDPOINT_URL}}{{end}}"
        # Ensure the repository exists (no-op if it already does).
        aws $EP --region {{.AWS_REGION}} ecr describe-repositories --repository-names {{.ECR_REPO}} >/dev/null 2>&1 \
          || aws $EP --region {{.AWS_REGION}} ecr create-repository --repository-name {{.ECR_REPO}} >/dev/null
        REPO_URI=$(aws $EP --region {{.AWS_REGION}} ecr describe-repositories --repository-names {{.ECR_REPO}} \
          --query 'repositories[0].repositoryUri' --output text)
        docker tag {{.ECR_REPO}}:{{.IMAGE_TAG}} "${REPO_URI}:{{.IMAGE_TAG}}"
        docker push "${REPO_URI}:{{.IMAGE_TAG}}"
        echo "Pushed ${REPO_URI}:{{.IMAGE_TAG}}"

  ecr:pull:
    desc: 'Pull {{.ECR_REPO}}:{{.IMAGE_TAG}} from ECR (verifies the pushed image)'
    deps: [ecr:login]
    cmds:
      - |
        set -euo pipefail
        EP="{{if .AWS_ENDPOINT_URL}}--endpoint-url {{.AWS_ENDPOINT_URL}}{{end}}"
        REPO_URI=$(aws $EP --region {{.AWS_REGION}} ecr describe-repositories --repository-names {{.ECR_REPO}} \
          --query 'repositories[0].repositoryUri' --output text)
        docker pull "${REPO_URI}:{{.IMAGE_TAG}}"

  # --- k8s ------------------------------------------------------------------
  k8s:expose-todo-db:
    desc: 'Port-forward the todo-app Postgres on the floci-EKS cluster (ENV=dev|prod) to localhost:15432 (DBeaver/psql: todo/todo, db todo)'
    cmds:
      # Postgres now runs on the floci-EKS cluster, not kind — use its kubeconfig.
      - task: eks:kubeconfig
        vars: { ENV: "{{.ENV}}" }
      - KUBECONFIG=/tmp/floci-eks-{{.ENV}}.kubeconfig kubectl -n todo-app port-forward svc/postgres 15432:5432

  # --- floci-EKS cluster (the k3s container Terraform/Terragrunt spins up).
  # Ownership split: THIS repo owns the cluster's network (MetalLB/ingress) and
  # the todo-app deployment (repo + Applications); the PLATFORM (local-gitops)
  # owns the GitOps control plane — Argo CD is installed via its
  # `eks:install-argo` task. eks:bootstrap orchestrates all three after
  # `terragrunt apply`. These run on the pipeline (and locally).
  #
  # LB IPs are OUTSIDE the kind MetalLB pools (mgmt .200-.209, dev .210-.219,
  # prod .220-.229) to avoid L2 collisions: dev EKS = .230, prod EKS = .240.
  eks:bootstrap:
    desc: 'Full floci-EKS bootstrap (ENV=dev|prod): network (app) + Argo CD (platform) + todo-app (app)'
    vars:
      LOCAL_GITOPS_DIR: '{{.LOCAL_GITOPS_DIR | default "/opt/local-gitops"}}'
    cmds:
      # 1) App-owned cluster network: MetalLB + ingress-nginx + kind-net.
      - task: eks:bootstrap-net
        vars: { ENV: "{{.ENV}}" }
      - task: eks:kubeconfig
        vars: { ENV: "{{.ENV}}" }
      # 2) Platform-owned GitOps control plane: install Argo CD via local-gitops.
      #    Mounted at /opt/local-gitops in CI; falls back to the home checkout.
      - |
        set -euo pipefail
        DIR="{{.LOCAL_GITOPS_DIR}}"
        [ -f "$DIR/Taskfile.yml" ] || DIR="$HOME/Documents/Personal/local-gitops"
        [ -f "$DIR/Taskfile.yml" ] || { echo "local-gitops not found — set LOCAL_GITOPS_DIR to its checkout" >&2; exit 1; }
        ( cd "$DIR" && task eks:install-argo ENV="{{.ENV}}" KUBECONFIG="/tmp/floci-eks-{{.ENV}}.kubeconfig" )
      # 3) App-owned deployment: repo credential + todo-app Applications.
      - task: eks:register-app
        vars: { ENV: "{{.ENV}}" }

  eks:bootstrap-net:
    desc: 'Install MetalLB (dedicated single-IP pool) + ingress-nginx into the floci-EKS cluster (ENV=dev|prod)'
    vars:
      K3S: "floci-eks-{{.PROJECT}}-{{.ENV}}"
      EKS_LB_IP: '{{if eq .ENV "prod"}}172.18.255.240{{else}}172.18.255.230{{end}}'
      METALLB_VERSION: '{{.METALLB_VERSION | default "v0.14.8"}}'
      INGRESS_NGINX_REF: '{{.INGRESS_NGINX_REF | default "controller-v1.11.3"}}'
    preconditions:
      - sh: docker inspect {{.K3S}} >/dev/null 2>&1
        msg: "k3s container {{.K3S}} not found — run `task terraform:apply ENV={{.ENV}}` (FLOCI=true) first."
    cmds:
      - task: eks:kubeconfig
        vars: { ENV: "{{.ENV}}" }
      - |
        set -euo pipefail
        export KUBECONFIG="/tmp/floci-eks-{{.ENV}}.kubeconfig"
        # The k3s container must sit on the shared `kind` network so MetalLB can
        # L2-advertise {{.EKS_LB_IP}} where the host (and kind) can reach it.
        docker network connect kind "{{.K3S}}" 2>/dev/null || true
        # 1) MetalLB (floci k3s ships no servicelb, so no klipper conflict).
        kubectl apply -f "https://raw.githubusercontent.com/metallb/metallb/{{.METALLB_VERSION}}/config/manifests/metallb-native.yaml" >/dev/null
        kubectl -n metallb-system rollout status deploy/controller --timeout=180s
        kubectl -n metallb-system rollout status daemonset/speaker --timeout=180s
        # 2) Single-IP pool + L2 advertisement (retry: the validating webhook may
        #    take a moment to accept connections after the controller is Ready).
        for i in $(seq 1 10); do
          kubectl apply -f - >/dev/null 2>&1 <<EOF && break || sleep 6
        apiVersion: metallb.io/v1beta1
        kind: IPAddressPool
        metadata: { name: floci-eks, namespace: metallb-system }
        spec:
          addresses: ["{{.EKS_LB_IP}}/32"]
        ---
        apiVersion: metallb.io/v1beta1
        kind: L2Advertisement
        metadata: { name: floci-eks, namespace: metallb-system }
        spec:
          ipAddressPools: [floci-eks]
        EOF
        done
        # 3) ingress-nginx (cloud manifest -> a LoadBalancer svc MetalLB fills).
        kubectl apply -f "https://raw.githubusercontent.com/kubernetes/ingress-nginx/{{.INGRESS_NGINX_REF}}/deploy/static/provider/cloud/deploy.yaml" >/dev/null
        kubectl -n ingress-nginx rollout status deploy/ingress-nginx-controller --timeout=240s
        kubectl -n ingress-nginx patch svc ingress-nginx-controller \
          -p '{"spec":{"loadBalancerIP":"{{.EKS_LB_IP}}"}}' >/dev/null 2>&1 || true
        echo "floci-eks-{{.ENV}} network ready — ingress LB IP {{.EKS_LB_IP}}"

  eks:register-app:
    desc: 'Register todo-app with the in-EKS Argo CD (ENV=dev|prod): Gitea repo credential + Applications (deps + app). Argo must already be installed (platform: eks:install-argo).'
    vars:
      K3S: "floci-eks-{{.PROJECT}}-{{.ENV}}"
    preconditions:
      - sh: docker inspect {{.K3S}} >/dev/null 2>&1
        msg: "k3s container {{.K3S}} not found — run `task terraform:apply ENV={{.ENV}}` (FLOCI=true) first."
    cmds:
      - task: eks:kubeconfig
        vars: { ENV: "{{.ENV}}" }
      - |
        set -euo pipefail
        export KUBECONFIG="/tmp/floci-eks-{{.ENV}}.kubeconfig"
        kubectl -n argocd get deploy argocd-server >/dev/null 2>&1 \
          || { echo "Argo CD not installed — run the platform task first (eks:install-argo)" >&2; exit 1; }
        # Gitea repo credential so the in-EKS Argo can read the app repo.
        kubectl apply -f - <<EOF >/dev/null
        apiVersion: v1
        kind: Secret
        metadata:
          name: repo-{{.GITEA_REPO_NAME}}
          namespace: argocd
          labels:
            argocd.argoproj.io/secret-type: repository
        stringData:
          type: git
          name: {{.GITEA_REPO_NAME}}
          url: {{.GITEA_INCLUSTER_URL}}/{{.GITEA_NS}}/{{.GITEA_REPO_NAME}}.git
          username: {{.GITEA_USER}}
          password: {{.GITEA_PASSWORD}}
        EOF
        # The app's Applications (deps wave 1, app wave 2) — in-cluster dest.
        kubectl apply \
          -f infra/k8s/gitops/applications/dependencies-{{.ENV}}.yaml \
          -f infra/k8s/gitops/applications/todo-app-{{.ENV}}.yaml >/dev/null
        echo "registered todo-app with the in-EKS Argo (ENV={{.ENV}})"

  eks:load-image:
    desc: 'Import an app image (IMAGE_TAG) into the floci-EKS workload cluster containerd (ENV=dev|prod). k3s equivalent of `kind load`.'
    vars:
      K3S: "floci-eks-{{.PROJECT}}-{{.ENV}}"
      APP_IMAGE: '{{.APP_IMAGE | default "local/todo-app"}}'
    preconditions:
      - sh: docker inspect {{.K3S}} >/dev/null 2>&1
        msg: "k3s container {{.K3S}} not found — run `task terraform:apply ENV={{.ENV}}` (FLOCI=true) first."
      - sh: docker image inspect {{.APP_IMAGE}}:{{.IMAGE_TAG}} >/dev/null 2>&1
        msg: "image {{.APP_IMAGE}}:{{.IMAGE_TAG}} not found locally — build it first."
    cmds:
      - |
        set -euo pipefail
        # Stream the image straight into k3s's containerd (namespace k8s.io), so
        # pods with imagePullPolicy: IfNotPresent run it without a registry pull.
        docker save "{{.APP_IMAGE}}:{{.IMAGE_TAG}}" \
          | docker exec -i "{{.K3S}}" ctr -n k8s.io images import -
        echo "loaded {{.APP_IMAGE}}:{{.IMAGE_TAG}} into {{.K3S}}"

  eks:kubeconfig:
    desc: 'Write a kubeconfig for the floci-EKS workload cluster (ENV=dev|prod) to KUBECONFIG_OUT (default /tmp/floci-eks-<env>.kubeconfig)'
    vars:
      K3S: "floci-eks-{{.PROJECT}}-{{.ENV}}"
    cmds:
      - |
        set -euo pipefail
        OUT="{{.KUBECONFIG_OUT}}"; [ -n "$OUT" ] || OUT="/tmp/floci-eks-{{.ENV}}.kubeconfig"
        PORT=$(docker inspect -f '{{`{{(index (index .NetworkSettings.Ports "6443/tcp") 0).HostPort}}`}}' "{{.K3S}}")
        docker exec "{{.K3S}}" cat /etc/rancher/k3s/k3s.yaml \
          | sed "s#https://127.0.0.1:6443#https://localhost:${PORT}#" > "$OUT"
        echo "wrote $OUT (server localhost:${PORT})"
        KUBECONFIG="$OUT" kubectl get nodes

  eks:argo-password:
    desc: 'Print the in-EKS Argo CD admin password (ENV=dev|prod). User: admin. UI: http://argo.<env>.local'
    cmds:
      - task: eks:kubeconfig
        vars: { ENV: "{{.ENV}}" }
      - |
        set -euo pipefail
        pw=$(KUBECONFIG="/tmp/floci-eks-{{.ENV}}.kubeconfig" kubectl -n argocd get secret argocd-initial-admin-secret \
          -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || true)
        [ -n "$pw" ] || { echo "no argocd-initial-admin-secret (Argo not bootstrapped, or password already rotated)" >&2; exit 1; }
        echo "Argo CD (floci-eks-{{.ENV}})  http://argo.{{.ENV}}.local   user: admin   password: $pw"

  eks:hosts:
    desc: 'Add/refresh /etc/hosts entries for the floci-EKS app (run with sudo): todo-app.dev.local -> .230, todo-app.prod.local -> .240'
    cmds:
      - |
        set -e
        # This repo owns ONLY its app hostname. The platform (local-gitops) owns
        # the ops-surface DNS (gitea/grafana/argo). Distinct marker so the two
        # writers never clobber each other's lines.
        [ -w /etc/hosts ] || { echo "need write access to /etc/hosts — run: sudo task eks:hosts" >&2; exit 1; }
        marker="# floci-eks-app"
        tmp=$(mktemp)
        grep -v "$marker" /etc/hosts > "$tmp" || true
        cat >> "$tmp" <<EOF
        172.18.255.230  todo-app.dev.local $marker
        172.18.255.240  todo-app.prod.local $marker
        EOF
        cp "$tmp" /etc/hosts && rm -f "$tmp"
        echo "updated /etc/hosts — todo-app.dev.local -> .230, todo-app.prod.local -> .240"

  k8s:trivy:
    desc: Trivy misconfiguration scan of the Helm chart (HIGH/CRITICAL)
    preconditions:
      - sh: command -v trivy
        msg: "Trivy not found. Install: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin"
    cmds:
      # Trivy renders the Helm chart with its default values and scans the manifests.
      - trivy config --severity HIGH,CRITICAL --exit-code 1 infra/k8s/helm

  # --- floci (local AWS emulator; aligns with local-gitops) -----------------
  aws:profile:
    desc: 'Ensure the local "{{.AWS_PROFILE_NAME}}" AWS CLI profile exists (creds test/test)'
    internal: true
    preconditions:
      - sh: command -v aws
        msg: "AWS CLI not found. Install: https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html"
    cmds:
      - |
        aws configure set aws_access_key_id test          --profile {{.AWS_PROFILE_NAME}}
        aws configure set aws_secret_access_key test       --profile {{.AWS_PROFILE_NAME}}
        aws configure set region {{.AWS_REGION}}           --profile {{.AWS_PROFILE_NAME}}
        aws configure set output json                      --profile {{.AWS_PROFILE_NAME}}


  # --- onboard this app into a running lab (run once, after install:app) ----
  gitea:create-repo:
    desc: 'Create the empty Gitea repo {{.GITEA_NS}}/{{.GITEA_REPO_NAME}} in the running lab (idempotent)'
    cmds:
      - |
        set -e
        code=$(curl -s -o /dev/null -w "%{http_code}" -u {{.GITEA_USER}}:{{.GITEA_PASSWORD}} -X POST \
          "{{.GITEA_WEB}}/api/v1/orgs/{{.GITEA_NS}}/repos" -H 'Content-Type: application/json' \
          -d '{"name":"{{.GITEA_REPO_NAME}}","private":false,"auto_init":false}')
        case "$code" in
          201) echo "created {{.GITEA_NS}}/{{.GITEA_REPO_NAME}}" ;;
          409) echo "{{.GITEA_NS}}/{{.GITEA_REPO_NAME}} already exists — ok" ;;
          *)   echo "ERROR: unexpected HTTP $code creating repo (is the lab up? is {{.GITEA_NS}} an org?)" >&2; exit 1 ;;
        esac
        echo "next: task argo:add-gitea-repo  then  task gitea:ship"

  argo:add-gitea-repo:
    desc: 'Onboarding notice — in the floci-EKS model, Argo CD is bootstrapped INSIDE each EKS cluster by the pipeline (eks:bootstrap), not on kind. Prints the /etc/hosts entries to ensure.'
    cmds:
      - |
        set -e
        cat <<'TXT'
        ┌─ floci-EKS deploy model ──────────────────────────────────────────────┐
        │ Each floci-provisioned EKS (k3s) cluster is self-contained: the        │
        │ DEV(AUTO) pipeline (ci-cd.yml) and PROD(MANUAL) pipeline (promote.yml)  │
        │ run `task eks:bootstrap` AFTER `terragrunt apply`, which installs       │
        │ MetalLB + ingress-nginx + Argo CD INTO the cluster and registers the    │
        │ repo + Applications. So there is nothing to register on the kind        │
        │ clusters here — just ship.                                             │
        └────────────────────────────────────────────────────────────────────────┘

        /etc/hosts ownership (the EKS services live on their own MetalLB IPs,
        outside the kind pools):
          • local-gitops writes (platform DNS): gitea .200, grafana .210/.220,
            argo.dev.local .230, argo.prod.local .240
          • THIS repo writes (app DNS):  sudo task eks:hosts
            → todo-app.dev.local .230, todo-app.prod.local .240

        next: sudo task eks:hosts  then  task gitea:ship   (DEV(AUTO): ci -> terraform -> cd)
        TXT

  # --- local CI/CD loop (push to lab Gitea; no reinstall) -------------------
  gitea:ship:
    desc: 'Push the current commit to lab Gitea {{.GITEA_NS}}/{{.GITEA_REPO_NAME}}:{{.GITEA_BRANCH}} to trigger the pipeline (no reinstall)'
    cmds:
      - |
        set -e
        host="{{.GITEA_WEB}}"; host="${host#http://}"; host="${host#https://}"
        ns="{{.GITEA_NS}}"; repo="{{.GITEA_REPO_NAME}}"; br="{{.GITEA_BRANCH}}"
        if ! git diff --quiet || ! git diff --cached --quiet; then
          echo "WARNING: uncommitted changes — the pipeline builds from the committed HEAD." >&2
          echo "         Commit first (git commit -am ...) so your change is what gets tested." >&2
        fi
        sha="$(git rev-parse --short HEAD)"
        echo "shipping ${sha} ($(git rev-parse --abbrev-ref HEAD)) -> ${ns}/${repo}:${br}"
        git push -f "http://{{.GITEA_USER}}:{{.GITEA_PASSWORD}}@${host}/${ns}/${repo}.git" "HEAD:${br}"
        echo "▶ watch: {{.GITEA_WEB}}/${ns}/${repo}/actions"

  gitea:promote:
    desc: 'Launch the PROD(MANUAL) promote.yml workflow on lab Gitea (TAG=<image tag>; default = current dev tag)'
    vars:
      TAG: '{{.TAG | default ""}}'
    cmds:
      - |
        set -e
        echo "dispatching promote.yml (tag='{{.TAG}}'{{if eq .TAG ""}} = current dev tag{{end}}) -> {{.GITEA_NS}}/{{.GITEA_REPO_NAME}}:{{.GITEA_BRANCH}}"
        code=$(curl -s -o /dev/null -w "%{http_code}" -u {{.GITEA_USER}}:{{.GITEA_PASSWORD}} -X POST \
          "{{.GITEA_WEB}}/api/v1/repos/{{.GITEA_NS}}/{{.GITEA_REPO_NAME}}/actions/workflows/promote.yml/dispatches" \
          -H 'Content-Type: application/json' \
          -d '{"ref":"{{.GITEA_BRANCH}}","inputs":{"tag":"{{.TAG}}"}}')
        case "$code" in
          204) echo "✅ promote.yml dispatched" ;;
          404) echo "ERROR: promote.yml not found on {{.GITEA_BRANCH}} (ship it first?) or Actions disabled on the repo" >&2; exit 1 ;;
          422) echo "ERROR: HTTP 422 — bad ref/inputs (is {{.GITEA_BRANCH}} the default branch with promote.yml?)" >&2; exit 1 ;;
          *)   echo "ERROR: unexpected HTTP $code dispatching promote.yml (is the lab up?)" >&2; exit 1 ;;
        esac
        echo "▶ watch: {{.GITEA_WEB}}/{{.GITEA_NS}}/{{.GITEA_REPO_NAME}}/actions"

  gitea:runs:
    desc: 'Show recent Gitea Actions runs for the lab repo (falls back to the UI on Gitea < 1.23)'
    cmds:
      - |
        api="{{.GITEA_WEB}}/api/v1/repos/{{.GITEA_NS}}/{{.GITEA_REPO_NAME}}/actions/tasks"
        ui="{{.GITEA_WEB}}/{{.GITEA_NS}}/{{.GITEA_REPO_NAME}}/actions"
        curl -s -u {{.GITEA_USER}}:{{.GITEA_PASSWORD}} "$api" | UI="$ui" python3 -c '
        import sys, json, os
        try:
            d = json.loads(sys.stdin.read())
            runs = d.get("workflow_runs") or d.get("tasks") or []
        except Exception:
            runs = None
        if runs is None:
            print("Actions run-listing API unavailable on this Gitea (< 1.23) — watch in the UI:")
            print(os.environ["UI"])
        elif not runs:
            print("(no runs yet)  " + os.environ["UI"])
        else:
            for t in runs[:10]:
                wf = t.get("name") or t.get("workflow_id") or "?"
                num = t.get("run_number", t.get("id", "?"))
                print("%-9s %-10s %s  #%s" % (t.get("status", "?"), t.get("conclusion", "") or "-", wf, num))
        '

  floci:wait-datastores:
    desc: 'Wait until the floci-provisioned Aurora backing accepts connections (fails loudly if not)'
    preconditions:
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - |
        ready=""
        for _ in $(seq 1 45); do
          docker run --rm --network {{.PROJECT}}-net -e PGPASSWORD=todopassword postgres:16-alpine \
            pg_isready -h floci-rds-todo-aurora -U todo -d todo >/dev/null 2>&1 && { ready=1; break; }
          sleep 2
        done
        [ -n "$ready" ] || { echo "ERROR: Aurora (floci-rds-todo-aurora) never became ready" >&2; exit 1; }
        echo "aurora ready"

  # --- atlas (DB schema migrations via the Atlas Docker image) --------------
  atlas:migrate:
    desc: 'Apply pending Atlas migrations to the running Postgres (creates tables + RLS)'
    preconditions:
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - |
        docker run --rm --network {{.ATLAS_NET}} -v "$PWD/migrations:/work" -w /work {{.ATLAS_IMAGE}} \
          migrate apply --url "{{.DB_URL}}" --dir file://versions

  atlas:status:
    desc: 'Show Atlas migration status (applied vs pending) for the running Postgres'
    preconditions:
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - |
        docker run --rm --network {{.ATLAS_NET}} -v "$PWD/migrations:/work" -w /work {{.ATLAS_IMAGE}} \
          migrate status --url "{{.DB_URL}}" --dir file://versions

  atlas:new:
    desc: 'Create a new empty versioned migration to hand-edit (NAME=add_something)'
    preconditions:
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - |
        [ -n "{{.NAME}}" ] || { echo "Usage: task atlas:new NAME=<migration_name>" >&2; exit 1; }
        docker run --rm -v "$PWD/migrations:/work" -w /work {{.ATLAS_IMAGE}} \
          migrate new {{.NAME}} --dir file://versions
        echo "Edit the new file under migrations/versions/, then run: task atlas:hash"

  atlas:hash:
    desc: 'Recompute migrations/versions/atlas.sum after editing migration files'
    preconditions:
      - sh: command -v docker
        msg: "Docker not found. Install: https://docs.docker.com/engine/install/"
    cmds:
      - docker run --rm -v "$PWD/migrations:/work" -w /work {{.ATLAS_IMAGE}} migrate hash --dir file://versions

  # --- docs (mkdocs project documentation site; separate from FastAPI /docs) -
  docs:serve:
    desc: 'Serve the mkdocs documentation site at http://127.0.0.1:8001 (API uses :8000)'
    cmds:
      - "{{.PY}} --group docs mkdocs serve -a 127.0.0.1:8001"

  docs:build:
    desc: 'Build the mkdocs documentation site into ./site'
    cmds:
      - "{{.PY}} --group docs mkdocs build --strict"

  # --- datastore access (floci-backed Aurora / ElastiCache) -----------------
  aurora:cli:
    desc: 'Open a psql shell on the floci Aurora (Postgres) backing'
    cmds:
      - docker exec -it -e PGPASSWORD=todopassword floci-rds-todo-aurora psql -U todo -d todo

  cache:cli:
    desc: 'Open a valkey-cli (Redis) shell on the floci ElastiCache backing'
    cmds:
      - docker exec -it floci-valkey-todo-redis valkey-cli

  # --- seed -----------------------------------------------------------------
  seed:demo:
    desc: 'Run the demo-data seeder init container against the running stack (idempotent)'
    cmds:
      - "{{.COMPOSE}} run --rm seed"

  # --- docker ---------------------------------------------------------------
  docker:_bringup:
    internal: true
    deps: [deps:check]
    cmds:
      - "{{.COMPOSE}} up -d --wait floci"
      - |
        export TF_VAR_floci_endpoint="{{.FLOCI_ENDPOINT}}"
        if ! command -v terraform >/dev/null 2>&1; then
          echo "Terraform is required to provision the floci stack (ECR/SSM + Aurora/ElastiCache)." >&2
          echo "Install: https://developer.hashicorp.com/terraform/install" >&2
          exit 1
        fi
        task terraform:init ENV=local
        task terraform:apply ENV=local AUTO_APPROVE=true
      - task: floci:wait-datastores
      - "{{.COMPOSE}} up -d --build --wait app aurora-fwd cache-fwd"

  docker:up:
    desc: 'Clean caches, then ordered local stack: floci → setup (terraform ENV=local) → app, then stream API logs'
    cmds:
      - task: clean:cache
      - task: docker:_bringup
      # Stream the API logs (Ctrl+C to detach; containers keep running detached).
      - "{{.COMPOSE}} logs -f app"

  docker:down:
    desc: Stop and remove containers, then clean caches
    cmds:
      - "{{.COMPOSE}} down"
      - task: clean:cache

  prune:
    desc: Remove ALL todo-app docker resources — containers, images, volumes, networks (keeps local-gitops)
    cmds:
      - "{{.COMPOSE}} down -v --remove-orphans 2>/dev/null || true"
      # Sweep anything left named/tagged for this app; spares the local-gitops
      # floci and the gitops/todo-app image.
      - |
        set -e
        ids=$(docker ps -aq --filter "name=todo-app" 2>/dev/null || true)
        [ -n "$ids" ]  && { docker rm -f $ids >/dev/null;        echo "containers removed: $(echo $ids | wc -w)"; }  || true
        imgs=$(docker images --format '{{"{{"}}.Repository{{"}}"}}:{{"{{"}}.Tag{{"}}"}}' 2>/dev/null | grep -E '(^|/)todo-app:|^arigaio/atlas:' | grep -v 'gitops/todo-app' || true)
        [ -n "$imgs" ] && { docker rmi -f $imgs >/dev/null 2>&1;  echo "images removed: $(echo "$imgs" | wc -l)"; }    || true
        vols=$(docker volume ls -q --filter "name=todo-app" 2>/dev/null || true)
        [ -n "$vols" ] && { docker volume rm $vols >/dev/null;    echo "volumes removed: $(echo $vols | wc -w)"; }     || true
        nets=$(docker network ls -q --filter "name=todo-app" 2>/dev/null || true)
        [ -n "$nets" ] && { docker network rm $nets >/dev/null 2>&1; echo "networks removed: $(echo $nets | wc -w)"; } || true
        docker rm -f floci-rds-todo-aurora floci-valkey-todo-redis >/dev/null 2>&1 || true
        rm -f {{.TF_DIR}}/local/terraform.tfstate {{.TF_DIR}}/local/terraform.tfstate.backup 2>/dev/null || true
        echo "Pruned all todo-app docker resources."
      - task: clean:cache

  docker:shell:
    desc: Open a shell in the running app container
    cmds:
      - "{{.COMPOSE}} exec app /bin/bash"

  docker:logs:
    desc: Tail logs from all services
    cmds:
      - "{{.COMPOSE}} logs -f"

  docker:smoke:
    desc: Verify the running stack — /health 200 (db+redis ok), /metrics and / reachable
    cmds:
      - |
        set -e
        echo "GET /health";  curl -fsS http://localhost:8000/health; echo
        echo "GET /metrics"; curl -fsS http://localhost:8000/metrics >/dev/null && echo "metrics ok"
        echo "GET /";        curl -fsS http://localhost:8000/ >/dev/null && echo "root ok"
        echo "Stack is healthy."

  docker:test:
    desc: Full local stack test — bring up floci → terraform → app, then smoke-check
    cmds:
      - task: docker:_bringup
      - task: docker:verify

  docker:verify:
    desc: Verify the running stack end-to-end — DB + Redis + floci (AWS) integration
    cmds:
      - |
        fail=0
        ok()  { printf '  \033[32m✓\033[0m %s\n' "$1"; }
        bad() { printf '  \033[31m✗\033[0m %s\n' "$1"; fail=1; }

        echo "── 1. API health (DB + Redis as the app sees them) ──"
        health=$(curl -fsS http://localhost:8000/health 2>/dev/null || true)
        echo "    ${health:-<no response — is the app up? run: task docker:up>}"
        printf '%s' "$health" | grep -q '"database":"ok"' && ok "app → database: ok" || bad "app → database NOT ok"
        printf '%s' "$health" | grep -q '"redis":"ok"'    && ok "app → redis: ok"    || bad "app → redis NOT ok"

        echo "── 2. Aurora (Postgres via floci RDS) — direct connection + schema ──"
        PG="docker run --rm --network {{.PROJECT}}-net -e PGPASSWORD=todopassword postgres:16-alpine psql -h floci-rds-todo-aurora -U todo -d todo -tAc"
        if v=$($PG 'show server_version' 2>/dev/null | tr -d '\r'); then
          ok "aurora reachable (v$v)"
        else
          bad "aurora (floci-rds-todo-aurora) not reachable"
        fi
        n=$($PG "select count(*) from information_schema.tables where table_schema='public' and table_name in ('users','tasks','ai_suggestions')" 2>/dev/null | tr -d '\r')
        [ "$n" = "3" ] && ok "schema migrated (users, tasks, ai_suggestions)" || bad "schema NOT migrated ($n/3 tables)"

        echo "── 3. ElastiCache (Redis via floci) — direct connection ──"
        [ "$(docker run --rm --network {{.PROJECT}}-net redis:7-alpine redis-cli -h floci-valkey-todo-redis ping 2>/dev/null | tr -d '\r')" = "PONG" ] && ok "elasticache PONG" || bad "elasticache no PONG"

        echo "── 4. floci (AWS) integration — from INSIDE the app container ──"
        out=$({{.COMPOSE}} exec -T app python -c "import boto3,os; ep=os.environ.get('AWS_ENDPOINT_URL'); ecr=boto3.client('ecr',endpoint_url=ep); r=[x['repositoryName'] for x in ecr.describe_repositories()['repositories']]; ssm=boto3.client('ssm',endpoint_url=ep); val=ssm.get_parameter(Name='/gitops/dev/todo-app/DB_USER')['Parameter']['Value']; print('EP=%s ECR=%s SSM:/gitops/dev/todo-app/DB_USER=%s'%(ep,r,val))" 2>&1 || true)
        echo "    $out"
        printf '%s' "$out" | grep -q 'ECR=' && ok "app → floci: ECR + SSM reachable" || bad "app → floci unreachable"

        echo
        if [ "$fail" -eq 0 ]; then
          printf '\033[32m✅ All checks passed — DB + Redis + floci integration working.\033[0m\n'
        else
          printf '\033[31m❌ Some checks FAILED (see above).\033[0m\n'; exit 1
        fi
