# Datastores are simulated by floci (local AWS): app/atlas reach the
# floci-spawned Aurora (floci-rds-todo-aurora) and ElastiCache/Valkey
# (floci-valkey-todo-redis) backings on todo-app-net. Terraform provisions them
# (infra/terraform/local); use `task docker:up` (a raw `docker compose up` will
# not provision floci resources).
name: todo-app

services:
  app:
    build:
      context: .
      target: dev
    image: local/todo-app:dev
    container_name: todo-app-api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
    depends_on:
      floci:
        condition: service_started
      atlas:
        condition: service_completed_successfully
    networks: [todo-app-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  atlas:
    image: arigaio/atlas:latest
    container_name: todo-app-atlas
    command: >-
      migrate apply
      --url postgres://todo:todopassword@floci-rds-todo-aurora:5432/todo?sslmode=disable
      --dir file://versions
    working_dir: /migrations
    volumes:
      - ./migrations:/migrations:ro
    networks: [todo-app-net]
    restart: "no"

  # Local AWS, independent of the local-gitops floci on host :4566.
  floci:
    image: floci/floci:latest
    container_name: todo-app-floci
    ports:
      - "4576:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [todo-app-net]
    restart: unless-stopped

networks:
  todo-app-net:
    name: todo-app-net
    driver: bridge
