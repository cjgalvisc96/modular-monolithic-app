name: CI

# GitHub mirror of the real repo: code-quality gate only. The full GitOps
# build/deploy lifecycle lives in .gitea/ (the local lab). Here we just
# guarantee quality on every push/PR via `task check:all`.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Quality + Architecture (task check:all)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync dependencies
        run: uv sync

      # check:all = check:quality (ruff + pyright + vulture + coverage ≥97% over
      # unit + integration) + check:architecture (import-linter contracts).
      # No PostgreSQL: the integration tier runs on SQLite and the RLS isolation
      # test self-skips without TEST_DATABASE_URL.
      - name: Run check:all
        run: task check:all
