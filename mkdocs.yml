site_name: TODO App
site_description: >-
  A DDD modular-monolith TODO service — bounded contexts, multi-tenancy via
  PostgreSQL RLS, and an AI context backed by Amazon Bedrock.
docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Bounded Contexts: architecture/bounded-contexts.md
      - Layering: architecture/layering.md
      - Multi-Tenancy: architecture/multi-tenancy.md
      - AI Context: architecture/ai-context.md
  - Decision Records:
      - Index: adr/index.md
      - 0001 Per-Context DI Containers: adr/0001-per-context-di-containers.md
      - 0002 Cognito over Keycloak: adr/0002-cognito-over-keycloak.md
      - 0003 RLS over App-Layer Tenancy: adr/0003-rls-over-app-layer-tenancy.md
      - 0004 AI as a Bounded Context: adr/0004-ai-as-bounded-context.md
      - 0005 DB Init as a Separate Job: adr/0005-db-init-as-separate-job.md
      - 0006 Least-Privilege IAM via IRSA: adr/0006-least-privilege-iam-irsa.md
  - Development:
      - Setup: development/setup.md
      - Testing: development/testing.md
      - Governance: development/governance.md
  - Operations:
      - Deployment: operations/deployment.md
      - GitOps Deployment: operations/gitops.md
      - Observability: operations/observability.md
      - Infrastructure: operations/infrastructure.md
