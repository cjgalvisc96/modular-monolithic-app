# Dev cluster overrides (local-gitops dev cluster).
# Namespace todo-app, lower resources, autoscaling off, verbose logging,
# DEBUG=true so the StubLlmClient + dev-auth header work without real AWS.

namespace: todo-app

namespaceConfig:
  create: false   # Argo CD creates the namespace (CreateNamespace=true)

replicaCount: 1

image:
  repository: local/todo-app
  tag: dev
  pullPolicy: IfNotPresent

serviceAccounts:
  api:
    roleArn: "arn:aws:iam::000000000000:role/todo-app-dev-api"
  ai:
    roleArn: "arn:aws:iam::000000000000:role/todo-app-dev-ai"
  dbInit:
    roleArn: "arn:aws:iam::000000000000:role/todo-app-dev-db-init"

ingress:
  enabled: true
  className: nginx
  host: todo-app.dev.local

metrics:
  enabled: true

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false

config:
  OWNER: dev
  DEBUG: "true"
  LOG_LEVEL: DEBUG
  AWS_REGION: us-east-1
  AWS_ENDPOINT_URL: "http://172.18.0.1:4566"   # floci (local AWS), via kind bridge
  ECR_REGISTRY: "000000000000.dkr.ecr.us-east-1.amazonaws.com"
  COGNITO_USER_POOL_ID: us-east-1_devpool
  COGNITO_APP_CLIENT_ID: devappclientid
  COGNITO_DOMAIN: todo-app-dev.auth.us-east-1.amazoncognito.com
  BEDROCK_MODEL_ID: anthropic.claude-3-5-sonnet-20240620-v1:0
  CACHE_ENABLE: "true"
  CACHE_NAMESPACES: users,tasks,ai
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: todo

# Secrets come from the platform's aws-ssm ClusterSecretStore (floci SSM),
# under /gitops/dev/todo-app/*.
externalSecrets:
  enabled: true
  parameterPrefix: /gitops/dev/todo-app

dbInit:
  enabled: true
  atlasEnv: dev
