{{- if not .Values.externalSecrets.enabled }}
# Plain Secret — only when ESO is disabled (plain-helm / docker-compose local).
# In the local-gitops platform externalSecrets.enabled=true, so the Secret is
# materialized by the ExternalSecret instead (see externalsecret.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todo-app.secretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | toString | b64enc | quote }}
  {{- end }}
{{- end }}
