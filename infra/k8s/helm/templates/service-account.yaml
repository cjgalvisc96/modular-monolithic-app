{{- /*
Three IRSA-annotated ServiceAccounts — one per workload.
Each is bound to its OWN scoped IAM role ARN (no shared role):
  - api    : API pod (Cognito verify, RDS IAM auth, cache)
  - ai      : AI/Bedrock pod (bedrock:InvokeModel)
  - db-init : Atlas migration Job (RDS connect/migrate)
The eks.amazonaws.com/role-arn annotation is the IRSA binding.
*/ -}}
{{- if .Values.serviceAccounts.api.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "todo-app.serviceAccountName.api" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    {{- with .Values.serviceAccounts.api.roleArn }}
    eks.amazonaws.com/role-arn: {{ . | quote }}
    {{- end }}
    {{- with .Values.serviceAccounts.api.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- if .Values.serviceAccounts.ai.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "todo-app.serviceAccountName.ai" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai
  annotations:
    {{- with .Values.serviceAccounts.ai.roleArn }}
    eks.amazonaws.com/role-arn: {{ . | quote }}
    {{- end }}
    {{- with .Values.serviceAccounts.ai.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- if .Values.serviceAccounts.dbInit.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "todo-app.serviceAccountName.dbInit" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-init
  annotations:
    {{- /* Hook-managed so it exists before the pre-install DB-init Job runs. */}}
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- with .Values.serviceAccounts.dbInit.roleArn }}
    eks.amazonaws.com/role-arn: {{ . | quote }}
    {{- end }}
    {{- with .Values.serviceAccounts.dbInit.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
