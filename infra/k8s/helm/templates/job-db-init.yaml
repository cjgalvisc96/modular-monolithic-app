{{- if .Values.dbInit.enabled }}
{{- /*
DB-init Job — runs Atlas migrations BEFORE the API rolls out.

It is a SEPARATE workload from the API Deployment (decoupled): the API
container never runs migrations on startup, which avoids migration races
when multiple replicas boot at once.

Ordered with Argo CD sync-waves (not Helm hooks) so it works under GitOps:
  - sync-wave "1"  : runs AFTER the ConfigMap/Secret/ExternalSecret (wave 0), so
                     the DB creds (incl. the ESO-materialized Secret, which Argo
                     waits to be Ready before this wave) exist when it runs, and
                     BEFORE the API Deployment (wave 2).
  - Replace=true,Force=true : a completed Job is immutable, and `kubectl replace`
                     needs the auto-generated spec.selector — so Force makes Argo
                     delete + recreate the Job each sync (fresh selector), which
                     re-runs the migration cleanly (Atlas is idempotent).
*/ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "todo-app.fullname" . }}-db-init
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-init
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: Replace=true,Force=true
spec:
  backoffLimit: {{ .Values.dbInit.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.dbInit.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "todo-app.labels" . | nindent 8 }}
        app.kubernetes.io/component: db-init
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "todo-app.serviceAccountName.dbInit" . }}
      automountServiceAccountToken: true
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        # The migration files (atlas.hcl + versions/) live in the app image; the
        # stock Atlas image ships none and k8s has no host bind-mount, so we share
        # them between containers via an emptyDir.
        - name: migrations
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      initContainers:
        # Copy migrations out of the app image into the shared volume.
        - name: load-migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # -r (not -a): the non-root user can't preserve ownership/timestamps
          # onto the emptyDir ("Operation not permitted"); contents are enough.
          command: ["sh", "-c", "cp -r /app/migrations/. /migrations/"]
          volumeMounts:
            - name: migrations
              mountPath: /migrations
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: atlas-migrate
          image: "{{ .Values.dbInit.image.repository }}:{{ .Values.dbInit.image.tag }}"
          imagePullPolicy: {{ .Values.dbInit.image.pullPolicy }}
          workingDir: /migrations
          # No command override — run the image's `atlas` entrypoint with args only
          # (overriding command to "atlas" looks it up in PATH and fails).
          args:
            - migrate
            - apply
            - --env
            - {{ .Values.dbInit.atlasEnv | quote }}
            - --config
            - file:///migrations/atlas.hcl
          env:
            # Build the Atlas DB URL from the same ConfigMap/Secret the API uses.
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "todo-app.configMapName" . }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "todo-app.configMapName" . }}
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "todo-app.configMapName" . }}
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "todo-app.secretName" . }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "todo-app.secretName" . }}
                  key: DB_PASSWORD
            - name: ATLAS_DB_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?sslmode=disable"
          volumeMounts:
            - name: migrations
              mountPath: /migrations
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.dbInit.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
{{- end }}
