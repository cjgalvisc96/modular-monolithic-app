{{- if .Values.externalSecrets.enabled }}
# ExternalSecret (External Secrets Operator) — materializes the app Secret from
# the platform's `aws-ssm` ClusterSecretStore (AWS SSM Parameter Store via
# floci). Each key is read from <parameterPrefix>/<KEY>, e.g.
# /gitops/dev/todo-app/DB_PASSWORD. Seed these into floci with:
#   aws --endpoint-url http://localhost:4566 --profile floci ssm put-parameter \
#     --name /gitops/dev/todo-app/DB_PASSWORD --type SecureString --value <pw> --overwrite
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "todo-app.secretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
  annotations:
    # ESO CRDs are installed by the platform's external-secrets ApplicationSet;
    # let Argo apply this before they are dry-run-checkable, then self-heal.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "todo-app.secretName" . }}
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecrets.keys }}
    - secretKey: {{ . }}
      remoteRef:
        key: {{ $.Values.externalSecrets.parameterPrefix }}/{{ . }}
    {{- end }}
{{- end }}
