# Prod cluster overrides (local-gitops prod cluster).
# Namespace todo-app, HPA enabled, higher resources, lean prod image, INFO logs.

namespace: todo-app

namespaceConfig:
  create: false   # Argo CD creates the namespace (CreateNamespace=true)

# Baseline replicas; HPA owns the live count when enabled.
replicaCount: 3

image:
  repository: local/todo-app
  tag: prod
  pullPolicy: IfNotPresent

serviceAccounts:
  api:
    roleArn: "arn:aws:iam::000000000000:role/todo-app-prod-api"
  ai:
    roleArn: "arn:aws:iam::000000000000:role/todo-app-prod-ai"
  dbInit:
    roleArn: "arn:aws:iam::000000000000:role/todo-app-prod-db-init"

ingress:
  enabled: true
  className: nginx
  host: todo-app.prod.local

metrics:
  enabled: true

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

config:
  OWNER: prod
  DEBUG: "false"
  LOG_LEVEL: INFO
  AWS_REGION: us-east-1
  AWS_ENDPOINT_URL: "http://172.18.0.1:4566"   # floci (local AWS), via kind bridge
  ECR_REGISTRY: "000000000000.dkr.ecr.us-east-1.amazonaws.com"
  COGNITO_USER_POOL_ID: us-east-1_prodpool
  COGNITO_APP_CLIENT_ID: prodappclientid
  COGNITO_DOMAIN: todo-app.auth.us-east-1.amazoncognito.com
  BEDROCK_MODEL_ID: anthropic.claude-3-5-sonnet-20240620-v1:0
  CACHE_ENABLE: "true"
  CACHE_NAMESPACES: users,tasks,ai
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: todo

# Secrets come from the platform's aws-ssm ClusterSecretStore (floci SSM),
# under /gitops/prod/todo-app/*.
externalSecrets:
  enabled: true
  parameterPrefix: /gitops/prod/todo-app

dbInit:
  enabled: true
  atlasEnv: prod
