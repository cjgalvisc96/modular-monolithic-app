# Default values for the todo-app chart.
# Common defaults; per-environment overrides live in values-dev.yaml /
# values-prod.yaml. The defaults target the local-gitops platform (kind + Argo
# CD + floci): one app-named namespace per cluster, ESO-backed secrets, an
# nginx Ingress, and Prometheus scrape annotations.

# Target namespace. Clusters are per-environment, so the namespace is the app
# name (not env-suffixed) — matching the platform's app1/app2/observability layout.
namespace: todo-app

namespaceConfig:
  # GitOps controllers (Argo CD) create the namespace via CreateNamespace=true,
  # so the chart does NOT render its own Namespace by default.
  create: false

# Number of API replicas (ignored when autoscaling.enabled=true).
replicaCount: 1

image:
  repository: local/todo-app
  # `prod` is the lean runtime image; `dev` enables uvicorn --reload.
  tag: prod
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# ServiceAccounts + IRSA. Each workload gets its OWN SA bound to its OWN scoped
# IAM role. On the local kind/floci platform the role-arn annotations are no-ops
# (no AWS OIDC provider); on real EKS they bind the pod to its least-priv role.
# ---------------------------------------------------------------------------
serviceAccounts:
  api:
    create: true
    name: ""        # defaults to "<fullname>-api"
    roleArn: ""
    annotations: {}
  ai:
    create: true
    name: ""        # defaults to "<fullname>-ai"
    roleArn: ""
    annotations: {}
  dbInit:
    create: true
    name: ""        # defaults to "<fullname>-db-init"
    roleArn: ""
    annotations: {}

rbac:
  create: true

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

containerPort: 8000

# ---------------------------------------------------------------------------
# Ingress (nginx). Host follows the platform convention <app>.<env>.local.
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  host: todo-app.dev.local
  path: /
  pathType: Prefix

# ---------------------------------------------------------------------------
# Prometheus scrape. The platform's OTel Collector scrapes pods carrying these
# annotations (it has no OTLP receiver), so the app exposes /metrics and is
# annotated for scraping. Grafana then reads them via Prometheus.
# ---------------------------------------------------------------------------
metrics:
  enabled: true
  port: 8000
  path: /metrics

# ---------------------------------------------------------------------------
# Probes (both hit /health)
# ---------------------------------------------------------------------------
probes:
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Non-secret application config -> ConfigMap.
# AWS_ENDPOINT_URL points the AWS SDK (boto3/Bedrock) at floci locally; it is
# honored natively by botocore. Empty on real AWS.
# ---------------------------------------------------------------------------
config:
  OWNER: local
  DEBUG: "false"
  LOG_LEVEL: INFO
  AWS_REGION: us-east-1
  AWS_ENDPOINT_URL: ""          # local-gitops: http://172.18.0.1:4566 (floci)
  ECR_REGISTRY: ""              # local-gitops: 000000000000.dkr.ecr.us-east-1.amazonaws.com
  COGNITO_USER_POOL_ID: us-east-1_example
  COGNITO_APP_CLIENT_ID: exampleappclientid
  COGNITO_DOMAIN: todo-app.auth.us-east-1.amazoncognito.com
  BEDROCK_MODEL_ID: anthropic.claude-3-5-sonnet-20240620-v1:0
  CACHE_ENABLE: "true"
  CACHE_NAMESPACES: users,tasks,ai
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: todo

# ---------------------------------------------------------------------------
# Secrets. Two delivery modes:
#  - externalSecrets.enabled=true  -> an ExternalSecret (ESO) materializes the
#    Secret from the platform's `aws-ssm` ClusterSecretStore (SSM Param Store
#    via floci), under <parameterPrefix>/<KEY>. This is the platform default.
#  - externalSecrets.enabled=false -> the chart renders a plain Secret from the
#    `secrets` map below (plain-helm / docker-compose local use only).
# Either way the Deployment envFroms the same Secret name.
# ---------------------------------------------------------------------------
externalSecrets:
  enabled: true
  # The platform's ClusterSecretStore (gitops-apps/platform/base/secretstore.yaml).
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  refreshInterval: 1m
  # SSM Parameter Store prefix: /gitops/<env>/<app>. Keys appended per secret.
  parameterPrefix: /gitops/dev/todo-app
  # Which keys to pull (remoteRef = <parameterPrefix>/<key>).
  keys:
    - DB_USER
    - DB_PASSWORD
    - REDIS_PASSWORD

secrets:
  DB_USER: todo
  DB_PASSWORD: todo
  REDIS_PASSWORD: ""

# ---------------------------------------------------------------------------
# DB-init Job (Atlas migrations) — Helm pre-install/pre-upgrade hook, decoupled
# from the API Deployment to avoid migration races across replicas.
# ---------------------------------------------------------------------------
dbInit:
  enabled: true
  image:
    repository: arigaio/atlas
    # Match local dev (Taskfile / docker-compose use arigaio/atlas:latest). The
    # previously pinned "0.21.1" tag was never published on Docker Hub → ErrImagePull.
    tag: "latest"
    pullPolicy: IfNotPresent
  atlasEnv: dev
  backoffLimit: 3
  activeDeadlineSeconds: 600
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
