namespaceConfig:
  create: false

externalSecrets:
  enabled: false

# Must match the in-cluster dependency manifests (dependencies/base/*.yaml): postgres todo/todo, redis --requirepass redispass.
secrets:
  DB_USER: todo
  DB_PASSWORD: todo
  REDIS_PASSWORD: redispass

ingress:
  enabled: true
  className: nginx

serviceAccounts:
  api:
    roleArn: ""
  ai:
    roleArn: ""
  dbInit:
    roleArn: ""

config:
  DEBUG: "true"
  LOG_LEVEL: DEBUG
  AWS_ENDPOINT_URL: ""
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: todo
  REDIS_HOST: redis
  REDIS_PORT: "6379"
