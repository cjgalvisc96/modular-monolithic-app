# Argo CD Application — PROD.
# Renders the todo-app Helm chart into the `prod-app` namespace on the prod
# cluster, using infra/k8s/helm/values-prod.yaml (HPA on, higher resources).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-app-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: todo-app
    env: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: todo-app
  source:
    repoURL: https://github.com/cjgalvisc96/local-gitops.git
    targetRevision: main
    path: infra/k8s/helm
    helm:
      releaseName: todo-app
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    # Prod cluster — registered separately from dev for the multi-cluster sim.
    name: prod-cluster
    namespace: prod-app
  syncPolicy:
    # Prod stays self-healing but does NOT auto-prune; destructive prunes are
    # promoted deliberately. Namespace is managed by the platform, so
    # CreateNamespace is omitted (values-prod.yaml sets namespaceConfig.create=false).
    automated:
      prune: false
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
