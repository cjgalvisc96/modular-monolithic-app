# Argo CD ApplicationSet for the TODO service — one Application per cluster.
#
# Mirrors the local-gitops platform's own `applications` ApplicationSet style:
# a cluster generator discovers the registered dev/prod clusters by their
# `environment` label and renders one Application each. The difference is that
# this service is deployed from its own Helm chart (infra/k8s/helm) rather than
# a kustomize overlay in the gitops-apps repo.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: todo-app
  namespace: argocd
  labels:
    gitops.local/app: todo-app
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: environment
              operator: In
              values: [dev, prod]
  template:
    metadata:
      name: "todo-app-{{.name}}"
      labels:
        gitops.local/env: "{{.name}}"
        gitops.local/app: todo-app
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: todo-app
      source:
        repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitops/modular-monolithic-app.git
        targetRevision: HEAD
        path: infra/k8s/helm
        helm:
          releaseName: todo-app
          # cluster name is the env: dev → values-dev.yaml, prod → values-prod.yaml
          valueFiles:
            - values.yaml
            - "values-{{.name}}.yaml"
          parameters:
            # Argo CD owns the namespace (CreateNamespace below), so the chart
            # must not also render its own Namespace object.
            - name: namespaceConfig.create
              value: "false"
      destination:
        name: "{{.name}}"   # registered cluster: dev / prod
        namespace: todo-app # app-named namespace (clusters are per-env)
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          # The DB-init Job is a Helm pre-install/pre-upgrade hook; Argo CD's
          # hook engine runs it before the Deployment becomes healthy.
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
