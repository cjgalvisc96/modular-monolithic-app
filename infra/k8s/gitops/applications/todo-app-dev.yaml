# Argo CD Application — todo-app on the dev floci-EKS (k3s) cluster.
#
# The floci-provisioned EKS cluster is self-contained: it runs its OWN Argo CD
# (installed by `task eks:bootstrap-argo ENV=dev` in the pipeline, after the
# Terragrunt apply), which syncs this Application IN-CLUSTER — exactly like the
# kind dev/prod clusters do. destination is therefore the in-cluster API.
#
# This is the app's registration artifact for the local-gitops platform. Drop a
# copy into platform-config/envs/dev/ (the root app-of-apps recurses that dir),
# and add this repo to the dev AppProject's sourceRepos. The 172.18.* address is
# the platform's default kind-bridge Gitea LB IP; local-gitops rewrites the
# prefix (subst_net) if its subnet differs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-app-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: dev
  source:
    repoURL: http://172.18.255.209:3000/gitops/modular-monolithic-app.git
    targetRevision: HEAD
    path: infra/k8s/helm
    helm:
      releaseName: todo-app
      valueFiles:
        - values.yaml
        - values-dev.yaml
        - values-floci.yaml
      parameters:
        - name: namespaceConfig.create
          value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: todo-app
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ApplyOutOfSyncOnly=true]
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 3m }
