# Argo CD Application — todo-app on the dev floci-EKS (k3s) cluster.
#
# The floci-provisioned EKS cluster is self-contained: it runs its OWN Argo CD
# (installed by the platform's `task eks:bootstrap ENV=dev` in the pipeline,
# after the Terragrunt apply), which syncs this Application IN-CLUSTER. The
# destination is therefore the in-cluster API.
#
# This repo owns the manifest; the platform's eks:bootstrap applies it (kubectl)
# from APP_DIR and adds the repo credential. The 172.18.* repoURL is the
# platform's kind-bridge Gitea LB IP.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-app-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: dev
  source:
    repoURL: http://172.18.255.209:3000/gitops/modular-monolithic-app.git
    targetRevision: HEAD
    path: infra/k8s/helm
    helm:
      releaseName: todo-app
      valueFiles:
        - values.yaml
        - values-dev.yaml
        - values-floci.yaml
      parameters:
        - name: namespaceConfig.create
          value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: todo-app
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ApplyOutOfSyncOnly=true]
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 3m }
