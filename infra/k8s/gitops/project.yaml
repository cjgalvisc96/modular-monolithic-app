# Argo CD AppProject for the TODO service.
#
# The local-gitops platform's built-in `dev`/`prod` projects restrict
# sourceRepos to the Gitea-hosted `gitops-apps` repo (kustomize overlays).
# This service ships its own Helm chart from its own repo, so it gets a
# dedicated, self-contained project that whitelists that repo and both
# clusters — no edits to the platform's projects required.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: todo-app
  namespace: argocd
  labels:
    gitops.local/app: todo-app
spec:
  description: TODO modular-monolith service across the dev and prod clusters.
  sourceRepos:
    # Gitea mirror of this repo (the local-gitops convention — Argo CD pulls
    # from the in-cluster Gitea). Mirror with the platform's repo-seeding, or
    # swap to the GitHub URL below if Argo CD has external access + creds.
    - http://gitea-http.gitea.svc.cluster.local:3000/gitops/modular-monolithic-app.git
    - https://github.com/cjgalvisc96/modular-monolithic-app.git
  destinations:
    - name: dev
      namespace: dev-app
    - name: prod
      namespace: prod-app
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
