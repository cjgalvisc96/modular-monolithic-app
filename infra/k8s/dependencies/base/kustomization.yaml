apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Local-only datastores for the todo-app namespace (kind/local-gitops). On real
# AWS these are Aurora + ElastiCache (Terraform); the chart's DB_HOST/REDIS_HOST
# point there instead. Synced by the dependencies-<env> Argo Application at
# sync-wave 1, so Postgres/Redis are healthy before the app's db-init hook runs.
resources:
  - postgres.yaml
  - redis.yaml
