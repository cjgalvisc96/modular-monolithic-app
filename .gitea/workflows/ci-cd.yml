name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  UV_VERSION: "0.11.19"
  TASK_VERSION: "v3.40.1"
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_REGION: us-east-1
  AWS_ENDPOINT_URL: http://localhost:4566
  FLOCI: "true"
  FLOCI_ENDPOINT: http://localhost:4566
  # Lab-only throwaway emulator password — floci doesn't run Aurora.
  TF_VAR_db_master_password: todolocalpw1

jobs:
  ci:
    runs-on: lab
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and task (pinned)
        run: |
          set -euo pipefail
          curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin "$TASK_VERSION"

      - name: Sync dependencies
        run: uv sync

      - name: Lint (ruff)
        run: task check:linter

      - name: Types (pyright)
        run: task check:types

      - name: Dead code (vulture)
        run: task check:deadcode

      - name: Architecture (import-linter)
        run: task check:architecture

      - name: Tests + coverage (>=97%)
        run: task test:coverage

  terraform:
    # State is kept in floci S3 between runs (the Terragrunt floci backend is local).
    needs: ci
    if: ${{ github.event_name == 'push' }}
    runs-on: lab
    concurrency:
      group: tf-dev
      cancel-in-progress: false
    env:
      STATE_DIR: infra/terraform/.floci-state/dev
      STATE_BUCKET: todo-app-tfstate-dev
      STATE_KEY: dev/terraform.tfstate
    steps:
      - uses: actions/checkout@v4

      - uses: ./.gitea/actions/setup-lab

      - name: Format check (terraform fmt + terragrunt hcl)
        run: task terraform:fmt

      - name: Validate modules (offline, no backend)
        run: task terraform:validate

      - name: Security scan (trivy)
        run: task terraform:trivy

      - name: Restore Terragrunt state from floci S3
        run: |
          set -euo pipefail
          EP="--endpoint-url $FLOCI_ENDPOINT"
          aws $EP s3 mb "s3://$STATE_BUCKET" >/dev/null 2>&1 || true
          mkdir -p "$STATE_DIR"
          if aws $EP s3 cp "s3://$STATE_BUCKET/$STATE_KEY" "$STATE_DIR/terraform.tfstate" >/dev/null 2>&1; then
            echo "restored prior state"
          else
            echo "no prior state (first run)"
          fi

      - name: Terragrunt apply (ENV=dev, floci)
        run: task terraform:apply ENV=dev AUTO_APPROVE=true

      - name: Save Terragrunt state to floci S3
        if: always()
        run: |
          set -euo pipefail
          EP="--endpoint-url $FLOCI_ENDPOINT"
          if [ -f "$STATE_DIR/terraform.tfstate" ]; then
            aws $EP s3 cp "$STATE_DIR/terraform.tfstate" "s3://$STATE_BUCKET/$STATE_KEY" >/dev/null 2>&1 \
              && echo "state saved" || echo "could not save state (floci S3 unavailable?)"
          else
            echo "no state file to save"
          fi

  cd:
    needs: terraform
    if: ${{ github.event_name == 'push' }}
    runs-on: lab
    concurrency:
      group: cd-${{ github.ref }}
      cancel-in-progress: false
    env:
      APP_IMAGE: local/todo-app
      ECR_REPO: todo-app
      LOCAL_GITOPS_DIR: /opt/local-gitops
    steps:
      - uses: actions/checkout@v4

      - uses: ./.gitea/actions/setup-lab

      - name: Resolve image tag
        id: vars
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build prod image
        run: docker build --target prod -t "$APP_IMAGE:${{ steps.vars.outputs.tag }}" .

      - name: Push to floci ECR (artifact store for promote)
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          aws --endpoint-url "$AWS_ENDPOINT_URL" ecr describe-repositories --repository-names "$ECR_REPO" >/dev/null 2>&1 \
            || aws --endpoint-url "$AWS_ENDPOINT_URL" ecr create-repository --repository-name "$ECR_REPO" >/dev/null
          REPO_URI=$(aws --endpoint-url "$AWS_ENDPOINT_URL" ecr describe-repositories \
            --repository-names "$ECR_REPO" --query 'repositories[0].repositoryUri' --output text)
          aws --endpoint-url "$AWS_ENDPOINT_URL" ecr get-login-password \
            | docker login --username AWS --password-stdin "${REPO_URI%%/*}"
          docker tag "$APP_IMAGE:$tag" "$REPO_URI:$tag"
          docker push "$REPO_URI:$tag"

      - name: Import the image into the floci-EKS containerd
        run: task eks:load-image ENV=dev IMAGE_TAG=${{ steps.vars.outputs.tag }}

      # Bump + push BEFORE registering the Argo Applications, so Argo's first sync targets the loaded image (else the db-init Job wedges on ImagePullBackOff). [skip ci] stops the bump commit re-triggering CD.
      - name: Bump values-dev.yaml and commit (so Argo's first sync uses the loaded tag)
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          yq -i ".image.tag = \"$tag\"" infra/k8s/helm/values-dev.yaml
          if git diff --quiet -- infra/k8s/helm/values-dev.yaml; then
            echo "values-dev.yaml already at $tag — nothing to commit"
          else
            git config user.name "gitea-actions"
            git config user.email "actions@gitops.local"
            git add infra/k8s/helm/values-dev.yaml
            git commit -m "ci: deploy $tag to dev [skip ci]"
            scheme="${GITHUB_SERVER_URL%%://*}"
            host="${GITHUB_SERVER_URL#*://}"
            git push "${scheme}://x-access-token:${{ github.token }}@${host}/${GITHUB_REPOSITORY}.git" HEAD:main
          fi

      - name: Register the app with the floci-EKS Argo CD
        run: |
          set -euo pipefail
          cd "$LOCAL_GITOPS_DIR"
          task eks:register-app ENV=dev APP_DIR="$GITHUB_WORKSPACE"

      - name: Handoff to PROD (manual)
        run: |
          echo "✅ DEV deployed to floci-EKS (tag ${{ steps.vars.outputs.tag }})."
          echo "▶ PROMOTE TO PROD (manual): ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions  →  'Promote to prod'  →  Run workflow"
          echo "  (or: the promote.yml workflow_dispatch — provisions prod infra then deploys via the in-EKS Argo)"
