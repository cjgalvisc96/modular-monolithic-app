name: CI

# Quality gates on the lab runner: lint, types, dead code, architecture, then
# the coverage suite (>=97%). Runs on pushes and PRs to main. A real PostgreSQL
# is started so the RLS isolation tests run (not skipped) and coverage holds.
#
# Runs on the host act_runner (runs-on: lab): host networking + the host docker
# socket, so the Postgres container is reachable at localhost. uv and task are
# pinned to the same versions the local-gitops lab pins (mise.toml).

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "migrations/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".gitea/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "migrations/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".gitea/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.11.19"
  TASK_VERSION: "v3.40.1"
  TEST_DATABASE_URL: postgresql://todo:todo@localhost:55432/todo

jobs:
  ci:
    runs-on: lab
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and task (pinned)
        run: |
          set -euo pipefail
          curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin "$TASK_VERSION"

      - name: Sync dependencies
        run: uv sync

      - name: Lint (ruff)
        run: task check:linter

      - name: Types (pyright)
        run: task check:types

      - name: Dead code (vulture)
        run: task check:deadcode

      - name: Architecture (import-linter)
        run: task check:architecture

      - name: Start PostgreSQL
        run: |
          set -euo pipefail
          docker rm -f todo-ci-pg >/dev/null 2>&1 || true
          docker run -d --name todo-ci-pg \
            -e POSTGRES_USER=todo -e POSTGRES_PASSWORD=todo -e POSTGRES_DB=todo \
            -p 55432:5432 postgres:16-alpine >/dev/null
          for _ in $(seq 1 30); do
            docker exec todo-ci-pg pg_isready -U todo -d todo >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Tests + coverage (>=97%)
        run: task test:coverage

      - name: Stop PostgreSQL
        if: always()
        run: docker rm -f todo-ci-pg >/dev/null 2>&1 || true
