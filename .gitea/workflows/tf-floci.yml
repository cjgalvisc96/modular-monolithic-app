name: Terraform (floci)

# Manage the local floci Terraform stack (infra/terraform/local) from Gitea:
# ECR + SSM + datastores that floci can emulate. This is the Terraform-native
# counterpart to floci-seed.sh. On push to main it applies; manual dispatch can
# plan / apply / destroy.
#
# Runs on the lab runner (runs-on: lab): host networking reaches floci at
# localhost:4566. The stack uses a LOCAL backend, so the state file is kept in
# floci's S3 between runs (the stack already points its s3 endpoint at floci) —
# without that, a fresh checkout would re-create resources and fail on
# "already exists".
#
# Caveats:
#  * The stack also provisions RDS Aurora + ElastiCache; the target floci must
#    emulate them. The app's compose floci (:4576) is where it is proven — point
#    the dispatch input there if the lab floci (:4566) doesn't.
#  * This overlaps with install.sh's imperative floci-seed (same gitops/todo-app
#    ECR + /gitops/<env>/todo-app SSM). To make Terraform the sole owner, drop
#    seed_floci from the lab.

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/local/**"
      - "infra/terraform/modules/**"
      - ".gitea/workflows/tf-floci.yml"
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        type: choice
        options: [plan, apply, destroy]
        default: plan
      floci_endpoint:
        description: floci endpoint to target
        required: false
        default: http://localhost:4566

concurrency:
  group: tf-floci
  cancel-in-progress: false

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.9.8"
  TASK_VERSION: "v3.40.1"
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_REGION: us-east-1
  FLOCI_ENDPOINT: ${{ github.event.inputs.floci_endpoint || 'http://localhost:4566' }}
  TF_VAR_floci_endpoint: ${{ github.event.inputs.floci_endpoint || 'http://localhost:4566' }}
  # Align the TF-managed ECR repo with what the app pipelines push/pull.
  TF_VAR_repository_name: gitops/todo-app
  STATE_DIR: infra/terraform/local
  STATE_BUCKET: todo-tfstate-local
  STATE_KEY: local/terraform.tfstate

jobs:
  terraform:
    runs-on: lab
    steps:
      - uses: actions/checkout@v4

      - uses: ./.gitea/actions/setup-lab

      - name: Install terraform + task (pinned)
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/tf.zip \
            "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
          unzip -q -o /tmp/tf.zip -d /usr/local/bin
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin "$TASK_VERSION"
          terraform version
          task --version

      - name: Restore state from floci S3
        run: |
          set -euo pipefail
          EP="--endpoint-url $FLOCI_ENDPOINT"
          aws $EP s3 mb "s3://$STATE_BUCKET" >/dev/null 2>&1 || true
          if aws $EP s3 cp "s3://$STATE_BUCKET/$STATE_KEY" "$STATE_DIR/terraform.tfstate" >/dev/null 2>&1; then
            echo "restored prior state"
          else
            echo "no prior state (first run)"
          fi

      - name: Terraform init
        run: task terraform:init ENV=local

      - name: Terraform ${{ github.event.inputs.action || 'apply' }}
        run: |
          set -euo pipefail
          action="${{ github.event.inputs.action || 'apply' }}"
          case "$action" in
            plan)    task terraform:plan    ENV=local ;;
            apply)   task terraform:apply   ENV=local AUTO_APPROVE=true ;;
            destroy) task terraform:destroy ENV=local AUTO_APPROVE=true ;;
            *) echo "unknown action: $action" >&2; exit 1 ;;
          esac

      - name: Save state to floci S3
        if: always()
        run: |
          set -euo pipefail
          EP="--endpoint-url $FLOCI_ENDPOINT"
          if [ -f "$STATE_DIR/terraform.tfstate" ]; then
            aws $EP s3 cp "$STATE_DIR/terraform.tfstate" "s3://$STATE_BUCKET/$STATE_KEY" >/dev/null 2>&1 \
              && echo "state saved" || echo "could not save state (floci S3 unavailable?)"
          else
            echo "no state file to save"
          fi
