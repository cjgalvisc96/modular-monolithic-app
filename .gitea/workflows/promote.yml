name: Promote to prod

# PROD (MANUAL) pipeline — workflow_dispatch only. Launch this by hand once the
# DEV(AUTO) pipeline (ci-cd.yml) is green. It mirrors dev:
#
#   terraform  provision the PROD cloud on floci via Terragrunt (ENV=prod), the
#              full infra/terragrunt/prod stack. FLOCI=true disables the modules
#              LocalStack-community can't apply, same as dev. State persists in
#              floci S3 between runs.
#   cd         take a tag already proven on dev (default: whatever values-dev.yaml
#              points at), pull it back from the floci ECR if this host pruned it,
#              import it into the floci-EKS prod cluster, bootstrap that cluster's
#              own GitOps stack (MetalLB + ingress-nginx + Argo CD + Applications),
#              then bump values-prod.yaml. The in-EKS Argo syncs in-cluster.
#
# This is the ONLY path that changes prod. No app build happens here — the image
# was built by ci-cd.yml's cd job and lives in the floci ECR. The manual launch
# is the approval gate (Gitea has no environment protection rules).
#
# Runs on the host act_runner (runs-on: lab): host networking + host docker, so
# floci is at localhost:4566 and `docker exec` reaches the prod k3s container.

on:
  # PROD is manual: launch from the Gitea Actions UI ("Run workflow") or via
  # `task gitea:promote` (the dispatch API). Both require Gitea >= 1.24 — the lab
  # pins chart 12.x for exactly this. Optional `tag` input; default = current dev.
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to promote (default: current dev tag)"
        required: false
        default: ""

concurrency:
  group: promote
  cancel-in-progress: false

permissions:
  contents: write

env:
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_REGION: us-east-1
  AWS_ENDPOINT_URL: http://localhost:4566
  FLOCI: "true"
  FLOCI_ENDPOINT: http://localhost:4566
  TF_VAR_db_master_password: todolocalpw1

jobs:
  terraform:
    # Provision the PROD floci cloud via Terragrunt before deploying.
    runs-on: lab
    concurrency:
      group: tf-prod
      cancel-in-progress: false
    env:
      STATE_DIR: infra/terraform/.floci-state/prod
      STATE_BUCKET: todo-app-tfstate-prod
      STATE_KEY: prod/terraform.tfstate
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: ./.gitea/actions/setup-lab

      - name: Restore Terragrunt state from floci S3
        run: |
          set -euo pipefail
          EP="--endpoint-url $FLOCI_ENDPOINT"
          aws $EP s3 mb "s3://$STATE_BUCKET" >/dev/null 2>&1 || true
          mkdir -p "$STATE_DIR"
          if aws $EP s3 cp "s3://$STATE_BUCKET/$STATE_KEY" "$STATE_DIR/terraform.tfstate" >/dev/null 2>&1; then
            echo "restored prior state"
          else
            echo "no prior state (first run)"
          fi

      - name: Terragrunt apply (ENV=prod, floci)
        run: task terraform:apply ENV=prod AUTO_APPROVE=true

      - name: Save Terragrunt state to floci S3
        if: always()
        run: |
          set -euo pipefail
          EP="--endpoint-url $FLOCI_ENDPOINT"
          if [ -f "$STATE_DIR/terraform.tfstate" ]; then
            aws $EP s3 cp "$STATE_DIR/terraform.tfstate" "s3://$STATE_BUCKET/$STATE_KEY" >/dev/null 2>&1 \
              && echo "state saved" || echo "could not save state (floci S3 unavailable?)"
          else
            echo "no state file to save"
          fi

  cd:
    # Promote the dev-proven image onto the floci-EKS prod cluster.
    needs: terraform
    runs-on: lab
    env:
      APP_IMAGE: local/todo-app
      ECR_REPO: todo-app
      LOCAL_GITOPS_DIR: /opt/local-gitops
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: ./.gitea/actions/setup-lab

      - name: Resolve tag
        id: vars
        run: |
          set -euo pipefail
          # workflow_dispatch input if given (UI on Gitea >= 1.23), else promote
          # whatever dev currently runs (values-dev.yaml on main).
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ] || [ "$tag" = "latest" ]; then
            tag="$(yq '.image.tag' infra/k8s/helm/values-dev.yaml)"
          fi
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "no tag to promote (run dev CD first so values-dev.yaml has a tag)" >&2
            exit 1
          fi
          echo "Promoting tag: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Ensure the image is available locally
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          if ! docker image inspect "$APP_IMAGE:$tag" >/dev/null 2>&1; then
            REPO_URI=$(aws --endpoint-url "$AWS_ENDPOINT_URL" ecr describe-repositories \
              --repository-names "$ECR_REPO" --query 'repositories[0].repositoryUri' --output text)
            aws --endpoint-url "$AWS_ENDPOINT_URL" ecr get-login-password \
              | docker login --username AWS --password-stdin "${REPO_URI%%/*}"
            docker pull "$REPO_URI:$tag"
            docker tag "$REPO_URI:$tag" "$APP_IMAGE:$tag"
          fi

      - name: Import the image into the floci-EKS prod containerd
        run: task eks:load-image ENV=prod IMAGE_TAG=${{ steps.vars.outputs.tag }}

      # Bump + push BEFORE registering the Argo Applications, so Argo's first
      # sync targets the loaded tag (avoids the db-init ImagePullBackOff wedge).
      - name: Bump values-prod.yaml and commit (so Argo's first sync uses the loaded tag)
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          yq -i ".image.tag = \"$tag\"" infra/k8s/helm/values-prod.yaml
          if git diff --quiet -- infra/k8s/helm/values-prod.yaml; then
            echo "values-prod.yaml already at $tag — nothing to commit"
          else
            git config user.name "gitea-actions"
            git config user.email "actions@gitops.local"
            git add infra/k8s/helm/values-prod.yaml
            git commit -m "ci: promote $tag to prod [skip ci]"
            scheme="${GITHUB_SERVER_URL%%://*}"
            host="${GITHUB_SERVER_URL#*://}"
            git push "${scheme}://x-access-token:${{ github.token }}@${host}/${GITHUB_REPOSITORY}.git" HEAD:main
          fi

      - name: Bootstrap the floci-EKS prod cluster (MetalLB + ingress-nginx + Argo CD + Applications)
        run: task eks:bootstrap ENV=prod
