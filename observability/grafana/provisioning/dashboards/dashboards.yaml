apiVersion: 1

providers:
  - name: todo-app-dashboards
    orgId: 1
    folder: todo-app
    folderUid: todo-app
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
